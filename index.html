<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soy Tomé Hub | Ecosistema Premium</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome 6.4.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CORE BLACK LABEL DESIGN SYSTEM */
        :root {
            --primary-rgb: 217, 70, 239; 
            --bg-color: #010101; 
        }

        body { 
            background-color: var(--bg-color); 
            color: #e2e8f0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Deep Glassmorphism (Bento Box VIP) */
        .glass-panel { 
            background: rgba(18, 18, 20, 0.7); 
            backdrop-filter: blur(28px); 
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 15px 35px rgba(0, 0, 0, 0.6);
            border-radius: 32px;
        }
        
        .glass-panel:hover {
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            box-shadow: 0 20px 50px -10px rgba(var(--primary-rgb), 0.15);
            transform: translateY(-2px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animaciones */
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .anim-fade { animation: fadeUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; opacity: 0; }
        
        .theme-text { color: rgb(var(--primary-rgb)); }
        .theme-bg { background-color: rgb(var(--primary-rgb)); }
        .theme-border { border-color: rgba(var(--primary-rgb), 0.4); }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(var(--primary-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0); }
        }
        .cta-pulse { animation: pulseGlow 2.5s infinite; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Hub de Acciones Móvil */
        @media (max-width: 640px) {
            .action-hub {
                position: fixed;
                bottom: 24px;
                left: 16px;
                right: 16px;
                display: flex;
                flex-direction: column-reverse;
                gap: 12px;
                z-index: 100;
            }
            .full-btn { width: 100% !important; justify-content: center !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = window.React;
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // =========================================================================
        // CONFIGURACIÓN DE SEGURIDAD Y FIREBASE
        // =========================================================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyCYQHwLpWxQxYj8Lk7GLAQT3c2_YaFs8Ew",
            authDomain: "soy-tome.firebaseapp.com",
            projectId: "soy-tome",
            storageBucket: "soy-tome.firebasestorage.app",
            messagingSenderId: "381653906684",
            appId: "1:381653906684:web:1c0a213ab4364fbed81379"
        };

        const isCanvas = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isCanvas ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'soytome-prod';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Rutas dinámicas para recuperar datos perdidos
        const getCatsPath = () => isCanvas ? `artifacts/${appId}/public/data/hub_categorias` : 'hub_categorias';
        const getSettingsPath = () => isCanvas ? `artifacts/${appId}/public/data/hub_settings` : 'hub_settings';
        const getBuzonPath = () => isCanvas ? `artifacts/${appId}/public/data/hub_buzon` : 'hub_buzon';

        const THEMES = {
            magenta: { name: 'Magenta Cyber', rgb: '217, 70, 239' },
            coral: { name: 'Coral Sunset', rgb: '251, 113, 133' },
            cyan: { name: 'Cyan Matrix', rgb: '6, 182, 212' },
            gold: { name: 'Oro Premium', rgb: '234, 179, 8' }
        };

        const ICONS = [
            { id: 'fa-whatsapp', class: 'fa-brands fa-whatsapp' },
            { id: 'fa-facebook', class: 'fa-brands fa-facebook' },
            { id: 'fa-instagram', class: 'fa-brands fa-instagram' },
            { id: 'fa-tiktok', class: 'fa-brands fa-tiktok' },
            { id: 'fa-youtube', class: 'fa-brands fa-youtube' },
            { id: 'fa-globe', class: 'fa-solid fa-globe' },
            { id: 'fa-bullhorn', class: 'fa-solid fa-bullhorn' },
            { id: 'fa-newspaper', class: 'fa-regular fa-newspaper' }
        ];

        const DEFAULT_SETTINGS = {
            theme: 'magenta',
            ctaText: 'Si no te ven, no existes. Aumenta tu visibilidad.',
            ctaPhone: '56933527264',
            ctaMessage: 'Hola Ian, quiero información sobre publicidad Black Label.',
            buzonWa: '56933527264',
            buzonTitle: 'Buzón de Exclusivas',
            ceoName: 'Ian',
            ceoRole: 'CEO Soy Tomé',
            ceoBio: 'Líder en marketing y comunicación regional.',
            showCeo: true
        };

        function App() {
            // Helpers
            const getWaLink = (phone, text) => `https://wa.me/${phone.replace(/\D/g, '')}?text=${encodeURIComponent(text)}`;

            const [user, setUser] = useState(null);
            const [categories, setCategories] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showBuzon, setShowBuzon] = useState(false);
            const [adminTab, setAdminTab] = useState('links');
            const [reports, setReports] = useState([]);

            // Estados de Formulario
            const [buzonForm, setBuzonForm] = useState({ name: '', type: 'noticia', message: '' });
            const [selectedFile, setSelectedFile] = useState(null);
            const [buzonStatus, setBuzonStatus] = useState('idle');
            const [authForm, setAuthForm] = useState({ user: '', pass: '' });
            const [newCatTitle, setNewCatTitle] = useState('');
            const [newCatIcon, setNewCatIcon] = useState('fa-globe');

            // 1. AUTENTICACIÓN
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (isCanvas && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.warn("Auth Fallback", e.message);
                        if (isLoading) setIsLoading(false);
                    }
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) loadData();
                });
                return () => unsub();
            }, []);

            // 2. CARGA DE DATOS
            const loadData = () => {
                const unsubCats = onSnapshot(collection(db, getCatsPath()), (snap) => {
                    const list = [];
                    snap.forEach(d => list.push({ id: d.id, ...d.data() }));
                    setCategories(list.sort((a,b) => (a.order || 0) - (b.order || 0)));
                });
                const unsubConf = onSnapshot(doc(db, getSettingsPath(), 'global'), (d) => {
                    if (d.exists()) setSettings(prev => ({...prev, ...d.data()}));
                    setIsLoading(false);
                });
                const unsubInbox = onSnapshot(collection(db, getBuzonPath()), (snap) => {
                    const list = [];
                    snap.forEach(d => list.push({ id: d.id, ...d.data() }));
                    setReports(list.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)));
                });
                return () => { unsubCats(); unsubConf(); unsubInbox(); };
            };

            useEffect(() => {
                if (THEMES[settings.theme]) {
                    document.documentElement.style.setProperty('--primary-rgb', THEMES[settings.theme].rgb);
                }
            }, [settings.theme]);

            // ACCIONES
            const handleBuzonSend = async (e) => {
                e.preventDefault();
                setBuzonStatus('sending');
                try {
                    await addDoc(collection(db, getBuzonPath()), { 
                        ...buzonForm, 
                        fileName: selectedFile ? selectedFile.name : 'Ninguno',
                        timestamp: Date.now() 
                    });
                    
                    const text = `🚨 *REPORTE CIUDADANO* 🚨\n\n*De:* ${buzonForm.name}\n*Tipo:* ${buzonForm.type.toUpperCase()}\n*Mensaje:* ${buzonForm.message}\n*Adjunto:* ${selectedFile ? selectedFile.name : 'Se adjuntará en el chat'}\n\n_Enviado desde Soy Tomé Hub_`;
                    
                    setBuzonStatus('success');
                    setTimeout(() => {
                        window.open(getWaLink(settings.buzonWa, text), '_blank');
                        setShowBuzon(false);
                        setBuzonStatus('idle');
                        setBuzonForm({ name: '', type: 'noticia', message: '' });
                        setSelectedFile(null);
                    }, 1500);
                } catch (err) { 
                    console.error(err);
                    setBuzonStatus('error');
                }
            };

            const addCategory = async () => {
                if (!newCatTitle.trim()) return;
                const id = `cat-${Date.now()}`;
                await setDoc(doc(db, getCatsPath(), id), { 
                    title: newCatTitle, 
                    iconId: newCatIcon, 
                    order: categories.length, 
                    links: [] 
                });
                setNewCatTitle('');
            };

            const updateSettings = async (newData) => {
                const updated = { ...settings, ...newData };
                setSettings(updated);
                await setDoc(doc(db, getSettingsPath(), 'global'), updated);
            };

            if (isLoading) return (
                <div className="min-h-screen bg-black flex flex-col items-center justify-center p-10">
                    <div className="w-12 h-12 border-t-purple-500 border-2 rounded-full animate-spin mb-6"></div>
                    <p className="text-white/20 text-[8px] font-black uppercase tracking-[0.8em]">Black Label Engine</p>
                </div>
            );

            return (
                <div className="min-h-screen relative pb-40">
                    {/* Background */}
                    <div className="fixed inset-0 pointer-events-none z-0 opacity-40">
                        <div className="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full blur-[150px] mix-blend-screen theme-bg opacity-30"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full blur-[150px] mix-blend-screen theme-bg opacity-20"></div>
                    </div>

                    {/* Header CEO */}
                    <div className="p-6 flex justify-end relative z-50">
                        {isAdmin ? 
                            <button onClick={()=>setIsAdmin(false)} className="bg-red-500/20 text-red-400 px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border border-red-500/30">Cerrar Bóveda</button> :
                            <button onClick={()=>setShowLogin(true)} className="text-white/20 hover:text-white transition-colors"><i className="fa-solid fa-fingerprint text-2xl"></i></button>
                        }
                    </div>

                    <main className="max-w-4xl mx-auto px-6 text-center pt-4">
                        <div className="mb-16 anim-fade">
                            <h1 className="text-8xl font-black text-white tracking-tighter mb-10 drop-shadow-[0_20px_40px_rgba(255,255,255,0.1)]">ST</h1>
                            {settings.showCeo && (
                                <div className="glass-panel p-8 max-w-md mx-auto relative group">
                                    {settings.ceoPhoto && <img src={settings.ceoPhoto} className="w-24 h-24 rounded-full mx-auto mb-4 border-2 theme-border object-cover shadow-2xl" />}
                                    <h2 className="text-2xl font-black text-white mb-1 tracking-tight">{settings.ceoName}</h2>
                                    <p className="theme-text text-[10px] font-black uppercase tracking-widest mb-4">{settings.ceoRole}</p>
                                    <p className="text-white/50 text-sm font-medium leading-relaxed">{settings.ceoBio}</p>
                                </div>
                            )}
                        </div>

                        {/* Panel Admin */}
                        {isAdmin && (
                            <div className="mb-16 glass-panel overflow-hidden text-left bg-zinc-950/80 border-white/10 shadow-2xl">
                                <div className="flex border-b border-white/5 bg-black/40 overflow-x-auto no-scrollbar">
                                    {['links', 'design', 'inbox'].map(t => (
                                        <button key={t} onClick={()=>setAdminTab(t)} className={`flex-1 min-w-[100px] py-4 text-[10px] font-black uppercase tracking-widest transition-all ${adminTab===t ? 'text-white border-b-2 theme-border bg-white/5' : 'text-white/30'}`}>{t}</button>
                                    ))}
                                </div>
                                <div className="p-8">
                                    {adminTab==='links' && (
                                        <div className="space-y-6">
                                            <div className="flex gap-3">
                                                <input placeholder="Nombre de Categoría" className="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white text-sm" value={newCatTitle} onChange={e=>setNewCatTitle(e.target.value)} />
                                                <button onClick={addCategory} className="theme-bg text-white px-8 rounded-2xl font-black text-xs uppercase shadow-lg hover:scale-105 transition-transform">Crear</button>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {ICONS.map(i => (
                                                    <button key={i.id} onClick={()=>setNewCatIcon(i.id)} className={`w-12 h-12 rounded-xl border transition-all ${newCatIcon===i.id ? 'theme-bg text-white shadow-lg' : 'bg-white/5 border-white/10 text-white/30'}`}>
                                                        <i className={i.class}></i>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    {adminTab==='design' && (
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                {Object.entries(THEMES).map(([k, t]) => (
                                                    <button key={k} onClick={()=>updateSettings({theme: k})} className={`p-4 rounded-2xl border text-left transition-all ${settings.theme===k ? 'border-white bg-white/10' : 'border-white/5 bg-black/40'}`}>
                                                        <div className="h-4 rounded-md mb-2 shadow-inner" style={{backgroundColor: `rgb(${t.rgb})`}}></div>
                                                        <span className="text-[10px] font-black text-white uppercase tracking-wider">{t.name}</span>
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="space-y-4 pt-4 border-t border-white/5">
                                                <input placeholder="URL Foto CEO" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white text-sm" value={settings.ceoPhoto || ''} onChange={e=>updateSettings({ceoPhoto: e.target.value})} />
                                                <textarea placeholder="Bio del CEO" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white text-sm h-24" value={settings.ceoBio || ''} onChange={e=>updateSettings({ceoBio: e.target.value})} />
                                            </div>
                                        </div>
                                    )}
                                    {adminTab==='inbox' && (
                                        <div className="space-y-4">
                                            {reports.length === 0 && <p className="text-white/20 text-center py-10 font-black uppercase text-xs">Sin Reportes Ciudadanos</p>}
                                            {reports.map(r => (
                                                <div key={r.id} className="bg-white/5 p-6 rounded-[1.5rem] border border-white/5 flex justify-between items-start group hover:border-white/20 transition-all">
                                                    <div>
                                                        <div className="flex items-center gap-3 mb-2">
                                                            <span className="text-[9px] font-black theme-bg text-white px-2 py-0.5 rounded uppercase">{r.type}</span>
                                                            <span className="text-white font-black text-sm">{r.name}</span>
                                                        </div>
                                                        <p className="text-white/60 text-sm leading-relaxed mb-2">{r.message}</p>
                                                        {r.fileName && <p className="text-[10px] theme-text font-bold uppercase tracking-widest"><i className="fa-solid fa-paperclip mr-2"></i>{r.fileName}</p>}
                                                    </div>
                                                    <button onClick={async ()=>{if(confirm('¿Borrar?')) await deleteDoc(doc(db, getBuzonPath(), r.id))}} className="text-red-500/30 hover:text-red-500 p-2"><i className="fa-solid fa-trash-can"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Bento Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                            {categories.map((cat, idx) => (
                                <div key={cat.id} className="glass-panel p-8 anim-fade relative group">
                                    <div className="flex items-center justify-between mb-8">
                                        <div className="flex items-center gap-5">
                                            <div className="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-3xl text-white shadow-inner">
                                                <i className={ICONS.find(i=>i.id===cat.iconId)?.class || 'fa-solid fa-globe'}></i>
                                            </div>
                                            <h3 className="text-2xl font-black text-white tracking-tight leading-none">{cat.title}</h3>
                                        </div>
                                        {isAdmin && (
                                            <button onClick={()=>deleteDoc(doc(db, getCatsPath(), cat.id))} className="text-red-500/30 hover:text-red-500 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                                        )}
                                    </div>
                                    <div className="space-y-3">
                                        {cat.links?.map(l => (
                                            <a key={l.id} href={l.url} target="_blank" className="flex justify-between items-center p-5 rounded-2xl bg-white/5 border border-white/5 hover:border-white/20 hover:scale-[1.02] transition-all group/link">
                                                <span className="font-bold text-white/70 group-hover/link:text-white">{l.title}</span>
                                                <i className="fa-solid fa-arrow-right text-[12px] text-white/20 -rotate-45 group-hover/link:text-white group-hover/link:rotate-0 transition-all"></i>
                                            </a>
                                        ))}
                                        {isAdmin && (
                                            <button onClick={async ()=>{
                                                const title = prompt('Nombre del link:');
                                                const url = prompt('URL:');
                                                if(title && url) {
                                                    const updated = [...(cat.links || []), { id: `l-${Date.now()}`, title, url }];
                                                    await setDoc(doc(db, getCatsPath(), cat.id), { ...cat, links: updated });
                                                }
                                            }} className="w-full py-4 border border-dashed border-white/10 rounded-2xl text-[10px] font-black uppercase text-white/20 hover:text-white transition-all">+ Inyectar Enlace</button>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Action Hub Fix Solapamiento */}
                    <div className="action-hub">
                        {settings.ctaEnabled && !isAdmin && (
                            <a href={getWaLink(settings.ctaPhone, settings.ctaMessage)} target="_blank" className="full-btn p-1 rounded-full theme-bg cta-pulse flex items-center shadow-2xl transition-transform hover:scale-105 active:scale-95">
                                <div className="bg-[#050505] p-2 pr-6 rounded-full flex items-center gap-4 w-full">
                                    <div className="w-11 h-11 rounded-full theme-bg flex items-center justify-center text-white text-xl shadow-inner"><i className="fa-brands fa-whatsapp"></i></div>
                                    <p className="text-white text-[10px] font-black leading-tight max-w-[180px] tracking-tight">{settings.ctaText}</p>
                                </div>
                            </a>
                        )}
                        {!isAdmin && (
                            <button onClick={()=>setShowBuzon(true)} className="full-btn flex items-center gap-4 bg-zinc-900/90 backdrop-blur-2xl p-2.5 pl-6 rounded-full border border-white/10 hover:border-blue-500 shadow-2xl transition-all group self-end md:self-start">
                                <span className="text-white text-[11px] font-black uppercase tracking-widest group-hover:text-blue-400">{settings.buzonTitle}</span>
                                <div className="w-11 h-11 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center text-white shadow-lg"><i className="fa-solid fa-bullhorn text-sm"></i></div>
                            </button>
                        )}
                    </div>

                    {/* Modal Buzon Real con Archivos */}
                    {showBuzon && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/90 backdrop-blur-xl p-4 anim-fade">
                            <div className="bg-[#0a0a0c] border border-white/10 p-8 sm:p-10 rounded-[3rem] w-full max-w-md relative shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
                                <button onClick={()=>setShowBuzon(false)} className="absolute top-8 right-8 text-white/30 hover:text-white"><i className="fa-solid fa-xmark text-2xl"></i></button>
                                <div className="mb-10 text-left">
                                    <h2 className="text-3xl font-black text-white tracking-tight leading-none mb-3">Enviar Exclusiva</h2>
                                    <p className="text-white/40 text-[10px] font-bold uppercase tracking-[0.3em]">Prensa Soy Tomé</p>
                                </div>

                                {buzonStatus==='success' ? (
                                    <div className="text-center py-12">
                                        <i className="fa-solid fa-paper-plane text-blue-400 text-7xl animate-bounce mb-8 shadow-blue-500/50"></i>
                                        <h3 className="text-white font-black text-xl mb-2">¡Reporte Enviado!</h3>
                                        <p className="text-white/40 text-sm">Redirigiendo a WhatsApp para recibir tu material...</p>
                                    </div>
                                ) : (
                                    <form onSubmit={handleBuzonSend} className="space-y-6">
                                        <input placeholder="Tu Nombre o Alias" className="w-full bg-white/5 border border-white/5 rounded-2xl px-6 py-5 text-white font-bold focus:border-blue-500 outline-none transition-colors" value={buzonForm.name} onChange={e=>setBuzonForm({...buzonForm, name: e.target.value})} required />
                                        
                                        <div className="grid grid-cols-3 gap-2">
                                            {['noticia','evento','alerta'].map(t => (
                                                <button type="button" key={t} onClick={()=>setBuzonForm({...buzonForm, type: t})} className={`py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border ${buzonForm.type===t ? 'border-blue-500 bg-blue-500/20 text-blue-400 shadow-lg' : 'bg-white/5 border-white/5 text-white/30'}`}>{t}</button>
                                            ))}
                                        </div>

                                        <textarea placeholder="¿Qué está pasando? Describe la situación..." className="w-full bg-white/5 border border-white/5 rounded-2xl px-6 py-5 text-white resize-none h-36 focus:border-blue-500 outline-none font-medium leading-relaxed" value={buzonForm.message} onChange={e=>setBuzonForm({...buzonForm, message: e.target.value})} required></textarea>
                                        
                                        {/* File Selection */}
                                        <div className="relative">
                                            <input type="file" id="file-picker" className="hidden" onChange={e => setSelectedFile(e.target.files[0])} />
                                            <label htmlFor="file-picker" className={`border-2 border-dashed p-6 rounded-3xl flex items-center justify-between cursor-pointer transition-all ${selectedFile ? 'border-blue-500 bg-blue-500/10' : 'border-white/10 hover:border-white/30 bg-black/20'}`}>
                                                <div className="flex items-center gap-4">
                                                    <i className={`fa-solid ${selectedFile ? 'fa-check-circle text-blue-400' : 'fa-cloud-arrow-up text-white/20'} text-2xl`}></i>
                                                    <div className="text-left leading-none">
                                                        <p className="text-[10px] font-black uppercase text-white/40 mb-1">{selectedFile ? 'Archivo Listo' : 'Cargar Multimedia'}</p>
                                                        <p className="text-white text-xs font-bold truncate max-w-[200px]">{selectedFile ? selectedFile.name : 'Fotos o Videos'}</p>
                                                    </div>
                                                </div>
                                                <i className="fa-brands fa-whatsapp text-green-500 text-2xl"></i>
                                            </label>
                                        </div>

                                        <button type="submit" disabled={buzonStatus==='sending'} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-[2rem] mt-4 transition-transform active:scale-95 uppercase tracking-widest text-xs shadow-[0_10px_30px_rgba(37,99,235,0.3)]">
                                            {buzonStatus==='sending' ? 'REGISTRANDO...' : 'ENVIAR REPORTE AHORA'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Modal Login Bóveda */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-3xl anim-fade">
                            <div className="bg-[#050505] border border-white/10 p-10 rounded-[3rem] w-full max-w-sm relative shadow-2xl">
                                <button onClick={()=>setShowLogin(false)} className="absolute top-8 right-8 text-white/30 hover:text-white"><i className="fa-solid fa-xmark text-2xl"></i></button>
                                <div className="text-center mb-12">
                                    <h2 className="text-3xl font-black text-white tracking-tighter uppercase leading-none mb-3">CEO Bóveda</h2>
                                    <p className="text-white/20 text-[10px] font-black uppercase tracking-widest">Nivel de Acceso 5</p>
                                </div>
                                <form onSubmit={(e)=>{
                                    e.preventDefault();
                                    if(authForm.user==='ian' && authForm.pass==='ian123'){ setIsAdmin(true); setShowLogin(false); }
                                    else { alert('Acceso denegado'); }
                                }} className="space-y-5">
                                    <input placeholder="USUARIO" className="w-full bg-white/5 border border-white/5 rounded-2xl px-6 py-5 text-white text-center font-black tracking-widest text-sm" onChange={e=>setAuthForm({...authForm, user: e.target.value})} required />
                                    <input type="password" placeholder="CLAVE" className="w-full bg-white/5 border border-white/5 rounded-2xl px-6 py-5 text-white text-center font-black tracking-[0.5em] text-sm" onChange={e=>setAuthForm({...authForm, pass: e.target.value})} required />
                                    <button type="submit" className="w-full bg-white text-black font-black py-5 rounded-[2rem] mt-8 uppercase tracking-[0.3em] text-[10px] transition-transform active:scale-95 shadow-[0_0_40px_rgba(255,255,255,0.15)]">Desbloquear</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
