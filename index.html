<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soy Tomé Lux | Exclusive</title>
    
    <!-- Fonts: Cormorant Garamond (Alta Costura/Editorial) & Inter (Minimalismo UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- Reset & Variables --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            /* Lujo Silencioso: Negros OLED y tonos Champagne/Platino */
            --bg-base: #000000;
            --glass-bg: rgba(15, 15, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.04);
            --glass-border-hover: rgba(229, 208, 161, 0.3);
            
            --text-main: #FFFFFF;
            --text-muted: #666666;
            
            /* Champagne Gold */
            --champagne: #E5D0A1;
            --champagne-glow: rgba(229, 208, 161, 0.15);
            
            --font-display: 'Cormorant Garamond', serif;
            --font-ui: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Fondo Premium Minimalista (Respiración Lumínica) --- */
        .ambient-light {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-base);
            z-index: -2;
            overflow: hidden;
        }
        .ambient-light::before {
            content: '';
            position: absolute;
            top: -20%; left: 50%;
            transform: translateX(-50%);
            width: 80vw; height: 80vh;
            background: radial-gradient(ellipse at center, var(--champagne-glow) 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.5;
            animation: breathe 10s infinite alternate ease-in-out;
        }
        
        /* Ruido sutil para textura */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
            pointer-events: none;
        }

        @keyframes breathe {
            0% { transform: translateX(-50%) scale(1); opacity: 0.3; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 0.6; }
        }

        /* --- Layout --- */
        .container {
            width: 100%; max-width: 440px; padding: 80px 24px 80px;
            display: flex; flex-direction: column; align-items: center; z-index: 1;
        }

        /* --- ST Logo Editorial --- */
        .header { text-align: center; margin-bottom: 60px; animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .st-logo {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 400;
            line-height: 1;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
            color: var(--text-main);
        }
        .brand-subtitle {
            font-family: var(--font-ui);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* --- Enlaces (Botones de Lujo Silencioso) --- */
        .links-wrapper { width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 20px 24px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 8px; 
            color: var(--text-main); text-decoration: none;
            font-weight: 300; font-size: 0.95rem; letter-spacing: 0.05em;
            backdrop-filter: blur(20px); 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
            opacity: 0; transform: translateY(15px); animation: fadeUp 0.8s forwards;
            cursor: pointer;
        }
        
        .link-btn:nth-child(1) { animation-delay: 0.1s; }
        .link-btn:nth-child(2) { animation-delay: 0.2s; }
        .link-btn:nth-child(3) { animation-delay: 0.3s; }
        .link-btn:nth-child(4) { animation-delay: 0.4s; }

        .link-btn i { position: absolute; left: 24px; color: var(--text-muted); font-size: 1.1rem; transition: all 0.5s ease; }
        
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--glass-border-hover);
            transform: translateY(-2px); 
        }
        .link-btn:hover i { color: var(--champagne); transform: translateX(3px); }

        /* Efecto Especial: Link Destacado */
        .link-highlight {
            border-color: rgba(229, 208, 161, 0.4);
            color: var(--champagne);
        }
        .link-highlight i { color: var(--champagne); }
        .link-highlight::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(229, 208, 161, 0.1), transparent);
            transform: skewX(-20deg);
            animation: slowShimmer 4s infinite;
        }
        
        /* Botón Mágico AI */
        .link-ai {
            background: linear-gradient(135deg, rgba(229, 208, 161, 0.05), transparent);
            border: 1px solid rgba(229, 208, 161, 0.2);
        }
        .link-ai:hover { box-shadow: 0 0 20px var(--champagne-glow); }

        /* --- Redes Sociales --- */
        .social-icons { display: flex; gap: 35px; margin-top: 70px; animation: fadeIn 2s forwards; }
        .social-btn { color: var(--text-muted); font-size: 1.3rem; transition: all 0.4s ease; text-decoration: none; }
        .social-btn:hover { color: var(--text-main); transform: translateY(-3px); }

        /* --- Controles Flotantes (CEO / Soporte) --- */
        .floating-controls {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; gap: 20px; z-index: 100;
        }
        .admin-trigger {
            color: var(--text-muted); font-size: 0.75rem; font-weight: 400; text-transform: uppercase; letter-spacing: 0.15em;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
            opacity: 0.5;
        }
        .admin-trigger:hover { color: var(--champagne); opacity: 1; }

        /* --- Modales UI (Editorial Style) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-box {
            background: transparent;
            padding: 40px 20px; width: 100%; max-width: 450px;
            transform: translateY(20px); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        
        .modal-box h3 { font-family: var(--font-display); font-size: 2rem; color: var(--text-main); margin-bottom: 10px; text-align: center; font-weight: 400; letter-spacing: 0.05em;}
        .modal-box p.subtitle { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 0.1em; }
        
        /* Inputs Minimalistas */
        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; color: var(--text-muted); margin-bottom: 10px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;}
        .input-group input, .input-group textarea {
            width: 100%; padding: 10px 0; background: transparent;
            border: none; border-bottom: 1px solid rgba(255,255,255,0.2); 
            color: #fff; font-size: 1rem; outline: none; transition: all 0.3s;
            font-family: var(--font-ui); font-weight: 300; resize: none;
        }
        .input-group input:focus, .input-group textarea:focus { border-bottom-color: var(--champagne); }
        
        /* Botones Admin */
        .btn-primary { width: 100%; padding: 18px; border-radius: 4px; border: 1px solid var(--champagne); background: transparent; color: var(--champagne); font-weight: 400; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.2em; cursor: pointer; margin-top: 20px; transition: all 0.4s;}
        .btn-primary:hover { background: var(--champagne); color: #000; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; background: transparent; color: var(--text-muted); border-color: var(--text-muted); }
        
        .btn-secondary { padding: 10px 20px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: var(--text-main); font-weight: 300; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-secondary:hover { border-color: var(--text-main); }
        
        .close-modal { color: var(--text-muted); text-align: center; display: block; margin-top: 35px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.3s;}
        .close-modal:hover { color: var(--text-main); }

        /* Lista editable CMS */
        .edit-link-card { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 20px 0; margin-bottom: 10px; }
        .edit-link-inputs { display: flex; flex-direction: column; gap: 15px; }
        .card-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .toggle-highlight { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; }
        .toggle-highlight input { cursor: pointer; accent-color: var(--champagne); }
        
        .btn-danger { background: transparent; color: #ef4444; border: none; font-size: 0.8rem; cursor: pointer; transition: opacity 0.3s; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.1em; }
        .btn-danger:hover { opacity: 1; }

        /* AI Output Box */
        .ai-output {
            margin-top: 30px; padding: 25px; border: 1px solid rgba(229, 208, 161, 0.2);
            border-radius: 8px; background: rgba(0,0,0,0.5); display: none;
            backdrop-filter: blur(10px);
        }

        /* --- Toast Minimalista --- */
        .toast {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(15,15,15,0.9); backdrop-filter: blur(10px); color: var(--text-main); 
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 30px; border-radius: 40px; text-transform: uppercase; letter-spacing: 0.15em;
            font-weight: 400; font-size: 0.7rem; z-index: 3000; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Animaciones */
        @keyframes slowShimmer { 0% { left: -100%; } 100% { left: 200%; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="ambient-light"></div>
    <div class="noise"></div>
    <div id="toast" class="toast">Mensaje</div>

    <!-- UI Principal -->
    <div class="container">
        <header class="header">
            <h1 class="st-logo">ST</h1>
            <div class="brand-subtitle">Soy Tomé Lux</div>
        </header>

        <nav class="links-wrapper" id="public-links-container">
            <!-- Renderizado Dinámico -->
        </nav>

        <div class="social-icons">
            <a href="#" id="soc-ig" class="social-btn" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" id="soc-tk" class="social-btn" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#" id="soc-fb" class="social-btn" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" id="soc-wa" class="social-btn" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </div>

    <!-- Controles Flotantes Discretos -->
    <div class="floating-controls">
        <div class="admin-trigger" onclick="openLogin('Soporte')">Soporte</div>
        <div class="admin-trigger" onclick="openLogin('CEO')">CEO</div>
    </div>

    <!-- Modal AI Copywriter -->
    <div class="modal-overlay" id="modal-ai">
        <div class="modal-box">
            <h3>Concierge de Marca ✨</h3>
            <p class="subtitle">Potenciado por IA de Nivel Ejecutivo</p>
            
            <div class="input-group">
                <label>Nombre de tu Negocio</label>
                <input type="text" id="ai-biz-name" placeholder="Ej: Café Noir">
            </div>
            <div class="input-group">
                <label>¿Qué ofreces? (Breve)</label>
                <textarea id="ai-biz-desc" rows="2" placeholder="Ej: Pastelería de autor y café de especialidad tostado en origen."></textarea>
            </div>
            
            <button class="btn-primary" id="btn-generate-ai" onclick="handleAIGenerate()">✨ Redactar Anuncio Premium</button>
            
            <div id="ai-output-area" class="ai-output">
                <!-- Gemini output goes here -->
            </div>

            <span class="close-modal" onclick="closeModals()">Volver</span>
        </div>
    </div>

    <!-- Modal Login -->
    <div class="modal-overlay" id="modal-login">
        <div class="modal-box">
            <h3 id="login-title">Acceso Restringido</h3>
            <div class="input-group">
                <input type="password" id="login-pass" placeholder="Clave de Autorización">
            </div>
            <button class="btn-primary" id="btn-login">Verificar</button>
            <span class="close-modal" onclick="closeModals()">Cancelar</span>
        </div>
    </div>

    <!-- Modal CMS -->
    <div class="modal-overlay" id="modal-dashboard">
        <div class="modal-box" style="max-width: 550px;">
            <h3>Panel de Control</h3>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                <h4 style="color: var(--text-main); font-weight: 300; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem;">Enlaces Activos</h4>
                <button class="btn-secondary" id="btn-add-new">+ Nuevo Enlace</button>
            </div>

            <div id="admin-links-container" style="margin-bottom: 50px;"></div>

            <h4 style="color: var(--text-main); font-weight: 300; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">Redes Sociales</h4>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <div class="input-group">
                    <label>Instagram URL</label>
                    <input type="text" id="input-soc-ig">
                </div>
                <div class="input-group">
                    <label>TikTok URL</label>
                    <input type="text" id="input-soc-tk">
                </div>
                <div class="input-group">
                    <label>WhatsApp URL</label>
                    <input type="text" id="input-soc-wa">
                </div>
            </div>

            <button class="btn-primary" id="btn-save-all" style="margin-top: 40px;">Guardar Cambios</button>
            <span class="close-modal" onclick="closeModals()">Cerrar Sistema</span>
        </div>
    </div>

    <script>
        // --- Gemini AI Integration ---
        const apiKey = ""; // API key is injected by the execution environment

        async function callGeminiWithRetry(prompt, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ text: "Eres un redactor publicitario de marcas de lujo (ej. Tom Ford, YSL). Escribe descripciones magnéticas, elegantes y persuasivas para negocios. Usa el concepto de 'Silent Luxury'. NUNCA uses emojis vulgares, signos de exclamación excesivos ni hashtags. Sé directo. Máximo 3 líneas." }] 
                }
            };
            const delays = [1000, 2000, 4000, 8000, 16000];

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No se pudo generar el texto.";
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function handleAIGenerate() {
            const name = document.getElementById('ai-biz-name').value.trim();
            const desc = document.getElementById('ai-biz-desc').value.trim();
            const output = document.getElementById('ai-output-area');
            const btn = document.getElementById('btn-generate-ai');

            if (!name || !desc) {
                showToast("Por favor, completa los datos de tu marca.");
                return;
            }

            btn.innerText = "Inyectando exclusividad... ✨";
            btn.disabled = true;
            output.style.display = "block";
            output.innerHTML = `<div style='text-align:center; padding: 20px 0;'>
                <i class='fa-solid fa-circle-notch fa-spin' style='color:var(--champagne); font-size: 1.5rem;'></i>
                <p style='color:var(--text-muted); font-size: 0.7rem; margin-top:15px; text-transform:uppercase; letter-spacing: 0.1em;'>Procesando estilo...</p>
            </div>`;

            const prompt = `Crea un copy publicitario ultra-premium para el negocio "${name}". Lo que ofrecen es: "${desc}". Debe sonar exclusivo, sofisticado e irresistible.`;

            try {
                const text = await callGeminiWithRetry(prompt);
                window.lastGeneratedText = text; // Guardar para copiar
                output.innerHTML = `
                    <p style="font-family: var(--font-display); font-size: 1.15rem; line-height: 1.5; color: var(--champagne); font-style: italic; text-align: center;">"${text}"</p>
                    <button class="btn-secondary" onclick="copyAIText()" style="margin-top: 25px; width: 100%; border-color: var(--champagne); color: var(--champagne);">
                        <i class="fa-regular fa-copy"></i> Copiar Texto
                    </button>
                `;
            } catch (error) {
                output.innerHTML = `<p style="color: #ef4444; font-size: 0.8rem; text-align: center;">Los servidores VIP están ocupados. Intenta en un momento.</p>`;
            } finally {
                btn.innerText = "✨ Redactar Anuncio Premium";
                btn.disabled = false;
            }
        }

        function copyAIText() {
            if (window.lastGeneratedText) {
                const textArea = document.createElement("textarea");
                textArea.value = window.lastGeneratedText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast("Texto premium copiado");
                } catch (err) {
                    showToast("Error al copiar texto");
                }
                document.body.removeChild(textArea);
            }
        }


        // --- Core Application (CMS) ---
        const STORAGE_KEY = 'st_lux_v4_ai';
        let currentRole = '';

        let appData = {
            links: [
                { id: 1, title: "Directorio Comercial", url: "https://soytomelux.cl", icon: "fa-store", highlight: false },
                { id: 2, title: "Anunciar mi Negocio", url: "https://soytomelux.cl/unirse", icon: "fa-bolt", highlight: true },
                // Nuevo enlace predeterminado que activa el Asistente IA
                { id: 3, title: "✨ Asistente de Marca IA", url: "#ai-generator", icon: "fa-wand-magic-sparkles", highlight: false }
            ],
            socials: {
                ig: "https://instagram.com/comercio.tome",
                tk: "https://tiktok.com/@soytome",
                fb: "https://facebook.com/soytome",
                wa: "https://wa.me/56900000000"
            }
        };

        const publicContainer = document.getElementById('public-links-container');
        const adminContainer = document.getElementById('admin-links-container');

        function initApp() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try { appData = JSON.parse(savedData); } catch (e) {}
            }
            renderPublicView();
        }

        function renderPublicView() {
            publicContainer.innerHTML = '';
            appData.links.forEach((link, index) => {
                const a = document.createElement('a');
                
                // Lógica de ruteo interno vs externo
                if (link.url === '#ai-generator') {
                    a.href = 'javascript:void(0)';
                    a.onclick = () => document.getElementById('modal-ai').classList.add('active');
                    a.className = `link-btn link-ai ${link.highlight ? 'link-highlight' : ''}`;
                } else {
                    a.href = link.url || '#';
                    a.target = '_blank';
                    a.className = `link-btn ${link.highlight ? 'link-highlight' : ''}`;
                }
                
                a.style.animationDelay = `${index * 0.15}s`;
                a.innerHTML = `<i class="fa-solid ${link.icon || 'fa-link'}"></i> ${link.title}`;
                publicContainer.appendChild(a);
            });

            document.getElementById('soc-ig').href = appData.socials.ig || '#';
            document.getElementById('soc-tk').href = appData.socials.tk || '#';
            document.getElementById('soc-fb').href = appData.socials.fb || '#';
            document.getElementById('soc-wa').href = appData.socials.wa || '#';
        }

        function renderAdminView() {
            adminContainer.innerHTML = '';
            appData.links.forEach(link => {
                const card = document.createElement('div');
                card.className = 'edit-link-card';
                card.innerHTML = `
                    <div class="edit-link-inputs">
                        <div class="input-group" style="margin-bottom:0;"><input type="text" class="link-edit-title" data-id="${link.id}" value="${link.title}" placeholder="Título del enlace"></div>
                        <div class="input-group" style="margin-bottom:0;"><input type="text" class="link-edit-url" data-id="${link.id}" value="${link.url}" placeholder="URL (Escribe #ai-generator para la IA)"></div>
                        <div class="input-group" style="margin-bottom:0;"><input type="text" class="link-edit-icon" data-id="${link.id}" value="${link.icon}" placeholder="Icono (ej: fa-star)"></div>
                    </div>
                    <div class="card-actions">
                        <label class="toggle-highlight">
                            <input type="checkbox" class="link-edit-highlight" data-id="${link.id}" ${link.highlight ? 'checked' : ''}>
                            Destacar (Brillo)
                        </label>
                        <button class="btn-danger btn-delete-link" data-id="${link.id}">Eliminar</button>
                    </div>
                `;
                adminContainer.appendChild(card);
            });

            document.getElementById('input-soc-ig').value = appData.socials.ig || '';
            document.getElementById('input-soc-tk').value = appData.socials.tk || '';
            document.getElementById('input-soc-wa').value = appData.socials.wa || '';

            document.querySelectorAll('.btn-delete-link').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idToRemove = parseInt(e.currentTarget.getAttribute('data-id'));
                    appData.links = appData.links.filter(l => l.id !== idToRemove);
                    renderAdminView(); 
                });
            });
        }

        document.getElementById('btn-add-new').addEventListener('click', () => {
            appData.links.push({ id: Date.now(), title: "Nuevo Enlace", url: "", icon: "fa-arrow-right", highlight: false });
            renderAdminView();
        });

        document.getElementById('btn-save-all').addEventListener('click', () => {
            const linkCards = document.querySelectorAll('.edit-link-card');
            let updatedLinks = [];
            
            linkCards.forEach(card => {
                const titleInput = card.querySelector('.link-edit-title');
                const id = parseInt(titleInput.getAttribute('data-id'));
                updatedLinks.push({
                    id: id,
                    title: titleInput.value,
                    url: card.querySelector('.link-edit-url').value,
                    icon: card.querySelector('.link-edit-icon').value,
                    highlight: card.querySelector('.link-edit-highlight').checked
                });
            });

            appData.links = updatedLinks;
            appData.socials.ig = document.getElementById('input-soc-ig').value;
            appData.socials.tk = document.getElementById('input-soc-tk').value;
            appData.socials.wa = document.getElementById('input-soc-wa').value;

            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
            renderPublicView();
            showToast("Plataforma Actualizada");
            closeModals();
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- Auth System ---
        function openLogin(role) {
            currentRole = role;
            document.getElementById('login-title').innerText = `Acceso ${role}`;
            document.getElementById('modal-login').classList.add('active');
            setTimeout(() => document.getElementById('login-pass').focus(), 100);
        }

        function closeModals() {
            document.getElementById('modal-login').classList.remove('active');
            document.getElementById('modal-dashboard').classList.remove('active');
            document.getElementById('modal-ai').classList.remove('active');
            document.getElementById('login-pass').value = "";
            document.getElementById('ai-output-area').style.display = "none";
        }

        document.getElementById('btn-login').addEventListener('click', () => {
            const p = document.getElementById('login-pass').value;
            if (p === "Ian123@") {
                document.getElementById('modal-login').classList.remove('active');
                document.getElementById('login-pass').value = "";
                
                if (currentRole === 'CEO') {
                    showToast("Bienvenido Ian");
                } else {
                    showToast("Acceso Autorizado: Soporte");
                }
                
                renderAdminView();
                setTimeout(() => document.getElementById('modal-dashboard').classList.add('active'), 300);
            } else {
                showToast("Acceso Denegado");
                document.getElementById('login-pass').value = "";
            }
        });

        document.getElementById('login-pass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('btn-login').click();
        });

        initApp();
    </script>
</body>
</html>
