<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soy Tomé Hub | Ecosistema Premium</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CORE BLACK LABEL DESIGN SYSTEM - BENTO UI */
        :root {
            --primary-rgb: 168, 85, 247; 
            --bg-color: #020202; 
        }

        body { 
            background-color: var(--bg-color); 
            color: #e2e8f0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Deep Glassmorphism (Estilo Apple / Silicon Valley) */
        .glass-panel { 
            background: rgba(20, 20, 22, 0.4); 
            backdrop-filter: blur(32px); 
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 20px 40px -10px rgba(0, 0, 0, 0.8);
            border-radius: 24px;
        }
        
        .glass-panel:hover {
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 20px 50px -10px rgba(var(--primary-rgb), 0.15);
            transform: translateY(-2px);
        }

        .glass-inner {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
        }

        /* Animaciones dinámicas de interfaz */
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { 0% { opacity: 0; transform: scale(0.92); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes slideRight { 0% { opacity: 0; transform: translateX(-30px); } 100% { opacity: 1; transform: translateX(0); } }
        
        .anim-fade { animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .anim-scale { animation: scaleIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .anim-slide { animation: slideRight 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        
        /* Delays */
        .d-100 { animation-delay: 100ms; } .d-200 { animation-delay: 200ms; } .d-300 { animation-delay: 300ms; }

        /* Efectos Temáticos Dinámicos */
        .theme-glow { box-shadow: 0 0 50px rgba(var(--primary-rgb), 0.25); }
        .theme-text { color: rgb(var(--primary-rgb)); }
        .theme-bg { background-color: rgb(var(--primary-rgb)); }
        .theme-border { border-color: rgba(var(--primary-rgb), 0.5); }
        .theme-hover:hover { background-color: rgba(var(--primary-rgb), 0.15); color: rgb(var(--primary-rgb)); }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(var(--primary-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0); }
        }
        .cta-pulse { animation: pulseGlow 2.5s infinite; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(var(--primary-rgb)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = window.React;
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // =========================================================================
        // 🚨 CONFIGURACIÓN FIREBASE (Tus llaves intactas) 🚨
        // =========================================================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyCYQHwLpWxQxYj8Lk7GLAQT3c2_YaFs8Ew",
            authDomain: "soy-tome.firebaseapp.com",
            projectId: "soy-tome",
            storageBucket: "soy-tome.firebasestorage.app",
            messagingSenderId: "381653906684",
            appId: "1:381653906684:web:1c0a213ab4364fbed81379"
        };
        
        const isCanvas = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isCanvas ? JSON.parse(__firebase_config) : myFirebaseConfig;
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'soytome-prod';

        const getCatsPath = () => isCanvas ? `artifacts/${appId}/public/data/categorias` : 'hub_categorias';
        const getSettingsPath = () => isCanvas ? `artifacts/${appId}/public/data/config` : 'hub_settings';
        const getBuzonPath = () => isCanvas ? `artifacts/${appId}/public/data/buzon` : 'hub_buzon';

        // NUEVAS OPCIONES PREMIUM (Diseño y Plantillas)
        const THEMES = {
            magenta: { name: 'Magenta Cyber', rgb: '217, 70, 239' },
            coral: { name: 'Coral Sunset', rgb: '251, 113, 133' },
            cyan: { name: 'Cyan Matrix', rgb: '6, 182, 212' },
            purple: { name: 'Púrpura Neón', rgb: '168, 85, 247' },
            emerald: { name: 'Esmeralda', rgb: '16, 185, 129' },
            gold: { name: 'Oro Premium', rgb: '234, 179, 8' }
        };

        const LAYOUTS = {
            grid: { name: 'Bento Grid', icon: 'fa-border-all' },
            list: { name: 'Directorio VIP', icon: 'fa-list-ul' }
        };

        const ANIMATIONS = {
            fade: { name: 'Elevación Premium', class: 'anim-fade' },
            scale: { name: 'Impacto Frontal', class: 'anim-scale' },
            slide: { name: 'Flujo Lateral', class: 'anim-slide' }
        };

        const ICONS = [
            { id: 'fa-whatsapp', class: 'fa-brands fa-whatsapp' },
            { id: 'fa-facebook', class: 'fa-brands fa-facebook' },
            { id: 'fa-instagram', class: 'fa-brands fa-instagram' },
            { id: 'fa-tiktok', class: 'fa-brands fa-tiktok' },
            { id: 'fa-youtube', class: 'fa-brands fa-youtube' },
            { id: 'fa-threads', class: 'fa-brands fa-threads' },
            { id: 'fa-globe', class: 'fa-solid fa-globe' },
            { id: 'fa-users', class: 'fa-solid fa-users' },
            { id: 'fa-bullhorn', class: 'fa-solid fa-bullhorn' },
            { id: 'fa-podcast', class: 'fa-solid fa-podcast' },
            { id: 'fa-store', class: 'fa-solid fa-store' },
            { id: 'fa-newspaper', class: 'fa-regular fa-newspaper' },
            { id: 'fa-link', class: 'fa-solid fa-link' },
            { id: 'fa-bolt', class: 'fa-solid fa-bolt' }
        ];

        const DEFAULT_SETTINGS = {
            theme: 'magenta',
            layout: 'grid',
            animation: 'fade',
            logoUrl: '',
            ceoPhoto: '',
            ceoName: 'Ian',
            ceoRole: 'CEO & Founder Soy Tomé',
            ceoBio: 'Líder en comunicación digital y marketing de alto impacto.', // NUEVO CAMPO
            showCeo: true,
            ctaEnabled: true,
            ctaText: 'Si no te ven, no existes. Aumenta tu visibilidad.',
            ctaPhone: '56900000000',
            ctaMessage: 'Hola Ian, quiero publicidad Black Label en Soy Tomé.',
            buzonEnabled: true,
            buzonTitle: 'Buzón de Exclusivas',
            buzonWa: '56900000000'
        };

        function App() {
            const [user, setUser] = useState(null);
            const [categories, setCategories] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [adminTab, setAdminTab] = useState('links'); 

            // Estado del Buzón Público
            const [showBuzon, setShowBuzon] = useState(false);
            const [buzonForm, setBuzonForm] = useState({ name: '', type: 'noticia', message: '' });
            const [buzonStatus, setBuzonStatus] = useState('idle'); 
            const [buzonReports, setBuzonReports] = useState([]); 

            // Auth Local State
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            // Edición de Categorías
            const [newCatTitle, setNewCatTitle] = useState('');
            const [newCatIcon, setNewCatIcon] = useState('fa-globe');
            const [editingCategory, setEditingCategory] = useState(null);
            const [editCatTitle, setEditCatTitle] = useState('');

            // Edición de Enlaces
            const [addingLinkTo, setAddingLinkTo] = useState(null);
            const [newLinkData, setNewLinkData] = useState({ title: '', url: '' });
            const [editingLinkObj, setEditingLinkObj] = useState(null); 
            const [editLinkData, setEditLinkData] = useState({ title: '', url: '' });

            // Radar de Errores del Motor
            const [systemError, setSystemError] = useState('');

            // 1. AUTENTICACIÓN FIREBASE SEGURA
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (isCanvas && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth error", e);
                        setSystemError("candado_auth");
                    }
                };
                initAuth();
                const unsubAuth = onAuthStateChanged(auth, setUser);
                return () => unsubAuth();
            }, []);

            // 2. SINCRONIZACIÓN DE DATOS
            useEffect(() => {
                if (!user) return;
                
                const unsubCats = onSnapshot(collection(db, getCatsPath()), (snapshot) => {
                    const loaded = [];
                    snapshot.forEach(doc => loaded.push({ id: doc.id, ...doc.data() }));
                    loaded.sort((a, b) => (a.order || 0) - (b.order || 0) || a.id.localeCompare(b.id));
                    setCategories(loaded);
                }, (error) => {
                    console.error("Error en DB:", error);
                    setSystemError("candado_bd");
                });

                const unsubSettings = onSnapshot(doc(db, getSettingsPath(), 'global'), (docSnap) => {
                    if (docSnap.exists()) {
                        setSettings({ ...DEFAULT_SETTINGS, ...docSnap.data() });
                    } else {
                        setDoc(doc(db, getSettingsPath(), 'global'), DEFAULT_SETTINGS).catch(e => console.error(e));
                    }
                    setIsLoading(false);
                }, (error) => {
                    console.error("Error en Settings:", error);
                    setSystemError("candado_bd");
                });

                const unsubBuzon = onSnapshot(collection(db, getBuzonPath()), (snapshot) => {
                    const loaded = [];
                    snapshot.forEach(doc => loaded.push({ id: doc.id, ...doc.data() }));
                    loaded.sort((a, b) => b.timestamp - a.timestamp); 
                    setBuzonReports(loaded);
                }, (error) => console.error("Error buzon:", error));

                return () => { unsubCats(); unsubSettings(); unsubBuzon(); };
            }, [user]);

            useEffect(() => {
                if (THEMES[settings.theme]) {
                    document.documentElement.style.setProperty('--primary-rgb', THEMES[settings.theme].rgb);
                }
            }, [settings.theme]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'ian' && password === 'ian123') {
                    setIsAdmin(true); setShowLogin(false); setLoginError(''); setUsername(''); setPassword('');
                } else {
                    setLoginError('Credenciales erróneas. Intento registrado.');
                }
            };

            const updateSettings = async (newConfig) => {
                const updated = { ...settings, ...newConfig };
                setSettings(updated); 
                await setDoc(doc(db, getSettingsPath(), 'global'), updated);
            };

            // ================= LÓGICA DEL BUZÓN =================
            const submitBuzon = async (e) => {
                e.preventDefault();
                if (!buzonForm.name.trim() || !buzonForm.message.trim()) return;
                
                setBuzonStatus('sending');
                try {
                    await addDoc(collection(db, getBuzonPath()), {
                        ...buzonForm,
                        timestamp: Date.now(),
                        status: 'unread'
                    });
                    setBuzonStatus('success');
                    setBuzonForm({ name: '', type: 'noticia', message: '' });
                    setTimeout(() => {
                        setShowBuzon(false);
                        setBuzonStatus('idle');
                    }, 3000);
                } catch (error) {
                    console.error("Error enviando reporte:", error);
                    setBuzonStatus('error');
                }
            };

            const deleteReport = async (reportId) => {
                if(confirm('¿Eliminar este reporte permanentemente?')) {
                    await deleteDoc(doc(db, getBuzonPath(), reportId));
                }
            };

            // ================= CRUD CATEGORÍAS =================
            const addCategory = async () => {
                if (!newCatTitle.trim()) return;
                const newId = `cat-${Date.now()}`;
                const newOrder = categories.length > 0 ? Math.max(...categories.map(c => c.order || 0)) + 1 : 0;
                await setDoc(doc(db, getCatsPath(), newId), { 
                    title: newCatTitle, 
                    iconId: newCatIcon, 
                    order: newOrder,
                    links: [] 
                });
                setNewCatTitle('');
            };

            const saveCategoryEdit = async (catId) => {
                if (!editCatTitle.trim()) { setEditingCategory(null); return; }
                const cat = categories.find(c => c.id === catId);
                if (cat) {
                    await setDoc(doc(db, getCatsPath(), catId), { ...cat, title: editCatTitle });
                }
                setEditingCategory(null);
            };

            const deleteCategory = async (catId) => {
                if (confirm('⚠️ ¿Eliminar esta categoría y todos sus enlaces?')) {
                    await deleteDoc(doc(db, getCatsPath(), catId));
                }
            };

            const moveCategory = async (index, direction) => {
                if (index + direction < 0 || index + direction >= categories.length) return;
                const catA = categories[index];
                const catB = categories[index + direction];
                const orderA = catA.order !== undefined ? catA.order : index;
                const orderB = catB.order !== undefined ? catB.order : index + direction;
                await setDoc(doc(db, getCatsPath(), catA.id), { ...catA, order: orderB });
                await setDoc(doc(db, getCatsPath(), catB.id), { ...catB, order: orderA });
            };

            // ================= CRUD ENLACES =================
            const addLink = async (catId) => {
                if (!newLinkData.title.trim() || !newLinkData.url.trim()) return;
                const cat = categories.find(c => c.id === catId);
                if (cat) {
                    await setDoc(doc(db, getCatsPath(), catId), { 
                        ...cat, 
                        links: [...cat.links, { id: `link-${Date.now()}`, ...newLinkData }] 
                    });
                    setNewLinkData({ title: '', url: '' });
                    setAddingLinkTo(null);
                }
            };

            const saveLinkEdit = async () => {
                if (!editingLinkObj) return;
                const { catId, linkId } = editingLinkObj;
                const cat = categories.find(c => c.id === catId);
                if (cat) {
                    const updatedLinks = cat.links.map(l => l.id === linkId ? { ...l, ...editLinkData } : l);
                    await setDoc(doc(db, getCatsPath(), catId), { ...cat, links: updatedLinks });
                }
                setEditingLinkObj(null);
            };

            const deleteLink = async (catId, linkId) => {
                const cat = categories.find(c => c.id === catId);
                if (cat) {
                    await setDoc(doc(db, getCatsPath(), catId), { 
                        ...cat, 
                        links: cat.links.filter(l => l.id !== linkId) 
                    });
                }
            };

            const moveLink = async (catId, linkIndex, direction) => {
                const cat = categories.find(c => c.id === catId);
                if (!cat) return;
                if (linkIndex + direction < 0 || linkIndex + direction >= cat.links.length) return;
                const newLinks = [...cat.links];
                const temp = newLinks[linkIndex];
                newLinks[linkIndex] = newLinks[linkIndex + direction];
                newLinks[linkIndex + direction] = temp;
                await setDoc(doc(db, getCatsPath(), catId), { ...cat, links: newLinks });
            };

            // Helpers
            const getAnimClass = () => ANIMATIONS[settings.animation]?.class || 'anim-fade';
            const generateWaLink = () => {
                const phone = settings.ctaPhone.replace(/\D/g, '');
                const text = encodeURIComponent(settings.ctaMessage);
                return `https://wa.me/${phone}?text=${text}`;
            };
            const generateBuzonWaLink = () => {
                const phone = settings.buzonWa.replace(/\D/g, '');
                const text = encodeURIComponent("Hola, tengo material audiovisual (fotos/videos) para enviar a Soy Tomé.");
                return `https://wa.me/${phone}?text=${text}`;
            };

            // PANTALLAS DE EMERGENCIA Y BLOQUEOS
            if (systemError === "candado_auth") {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#020202] px-6 text-center font-sans">
                        <i className="fa-solid fa-lock text-red-500 text-6xl mb-6 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]"></i>
                        <h2 className="text-3xl font-black text-white mb-3">Candado Firebase Activado</h2>
                        <p className="text-white/60 mb-8 max-w-md text-sm">El motor de élite está listo, pero Firebase está bloqueando el acceso anónimo. Desbloquéalo en 30 segundos.</p>
                        <div className="bg-[#111] border border-white/10 p-6 rounded-2xl text-left text-sm text-white/80 space-y-4 font-medium shadow-2xl max-w-md w-full">
                            <p className="flex gap-3"><span className="text-red-400 font-bold">1.</span> Ve a Firebase Console &gt; Tu proyecto.</p>
                            <p className="flex gap-3"><span className="text-red-400 font-bold">2.</span> Menú izquierdo: <b>Authentication</b>.</p>
                            <p className="flex gap-3"><span className="text-red-400 font-bold">3.</span> Pestaña <b>Sign-in method</b>.</p>
                            <p className="flex gap-3"><span className="text-red-400 font-bold">4.</span> Activa <b>Anónimo</b> y Guarda.</p>
                        </div>
                    </div>
                );
            }

            if (systemError === "candado_bd") {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#020202] px-6 text-center">
                        <i className="fa-solid fa-database text-red-500 text-6xl mb-6 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]"></i>
                        <h2 className="text-3xl font-black text-white mb-3">Reglas de Acceso Estrictas</h2>
                        <p className="text-white/60 mb-6 max-w-sm text-sm">Firestore está bloqueando la conexión. Ve a Firebase &gt; Firestore Database &gt; Reglas, y asegúrate de que esté en Modo de Prueba.</p>
                    </div>
                );
            }

            if (isLoading || !user) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#020202]">
                        <div className="w-16 h-16 border-2 border-white/5 border-t-purple-500 rounded-full animate-spin mb-6"></div>
                        <p className="text-white/30 text-[10px] font-bold tracking-[0.4em] animate-pulse uppercase">Conectando Ecosistema</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative overflow-hidden pb-40">
                    {/* Fondo Ambient Dynamics (Apple-like) */}
                    <div className="fixed inset-0 pointer-events-none z-0 opacity-40">
                        <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full blur-[160px] mix-blend-screen theme-bg opacity-30"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full blur-[160px] mix-blend-screen theme-bg opacity-20"></div>
                        <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+')] opacity-40 mix-blend-overlay"></div>
                    </div>

                    {/* TOP BAR & ADMIN TRIGGER */}
                    <div className="relative z-50 flex justify-end p-4 md:p-6 max-w-5xl mx-auto">
                        <div className={`${getAnimClass()}`}>
                            {isAdmin ? (
                                <button onClick={() => setIsAdmin(false)} className="px-5 py-2.5 rounded-full bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 text-[10px] font-black tracking-widest uppercase transition-all backdrop-blur-md flex items-center gap-2">
                                    <i className="fa-solid fa-lock"></i> Cerrar Bóveda
                                </button>
                            ) : (
                                <button onClick={() => setShowLogin(true)} className="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 hover:bg-white/10 text-white/30 hover:text-white transition-all backdrop-blur-md">
                                    <i className="fa-solid fa-fingerprint"></i>
                                </button>
                            )}
                        </div>
                    </div>

                    <main className="relative z-30 max-w-4xl mx-auto px-4 sm:px-6 pt-2 pb-12">
                        
                        {/* HERO SECTION / CEO PROFILE (Bento Style) */}
                        <div className={`${getAnimClass()} d-100 flex flex-col items-center text-center mb-16`}>
                            {settings.logoUrl ? (
                                <img src={settings.logoUrl} alt="Logo" className="h-28 md:h-32 object-contain theme-glow rounded-3xl mb-8 transition-transform hover:scale-105" />
                            ) : (
                                <div className="w-28 h-28 md:w-32 md:h-32 rounded-[2rem] theme-bg bg-opacity-10 border border-white/10 flex items-center justify-center theme-glow backdrop-blur-2xl mb-8 shadow-2xl">
                                    <span className="text-5xl md:text-6xl font-black text-white tracking-tighter">ST</span>
                                </div>
                            )}

                            {settings.showCeo && (
                                <div className="glass-panel p-6 max-w-md w-full relative overflow-hidden group">
                                    <div className="absolute inset-0 glass-inner pointer-events-none"></div>
                                    <div className="relative z-10 flex flex-col items-center">
                                        {settings.ceoPhoto ? (
                                            <img src={settings.ceoPhoto} alt="CEO" className="w-20 h-20 rounded-full object-cover border-2 theme-border shadow-[0_0_30px_rgba(var(--primary-rgb),0.3)] mb-4 group-hover:scale-105 transition-transform duration-500" />
                                        ) : (
                                            <div className="w-20 h-20 rounded-full theme-bg bg-opacity-20 flex items-center justify-center border-2 theme-border text-white text-2xl mb-4">
                                                <i className="fa-solid fa-user-tie"></i>
                                            </div>
                                        )}
                                        <h1 className="text-2xl font-black text-white tracking-tight mb-1">{settings.ceoName}</h1>
                                        <h2 className="theme-text text-[10px] font-black tracking-[0.2em] uppercase mb-4">{settings.ceoRole}</h2>
                                        {settings.ceoBio && (
                                            <p className="text-white/60 text-sm font-medium leading-relaxed px-4">{settings.ceoBio}</p>
                                        )}
                                    </div>

                                                                    </div>
                                                                </a>
                                                                
                                                                {isAdmin && (
                                                                    <div className="flex flex-col gap-1 w-12">
                                                                        <div className="flex-1 bg-black/40 rounded-xl flex flex-col items-center justify-center border border-white/5">
                                                                            <button onClick={() => moveLink(category.id, lIndex, -1)} disabled={lIndex===0} className="flex-1 w-full text-white/30 hover:text-white disabled:opacity-20"><i className="fa-solid fa-caret-up text-xs"></i></button>
                                                                            <button onClick={() => moveLink(category.id, lIndex, 1)} disabled={lIndex===category.links.length-1} className="flex-1 w-full text-white/30 hover:text-white disabled:opacity-20"><i className="fa-solid fa-caret-down text-xs"></i></button>
                                                                        </div>
                                                                        <div className="flex h-10 gap-1">
                                                                            <button onClick={() => { setEditLinkData({title: link.title, url: link.url}); setEditingLinkObj({catId: category.id, linkId: link.id}); }} className="flex-1 bg-blue-500/10 text-blue-400 hover:bg-blue-500/20 rounded-xl flex items-center justify-center transition-colors"><i className="fa-solid fa-pen text-[10px]"></i></button>
                                                                            <button onClick={() => deleteLink(category.id, link.id)} className="flex-1 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-xl flex items-center justify-center transition-colors"><i className="fa-solid fa-xmark text-[10px]"></i></button>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}

                                                {isAdmin && (
                                                    <div className="pt-3">
                                                        {addingLinkTo === category.id ? (
                                                            <div className="bg-[#111] p-5 rounded-2xl border border-white/10 space-y-4 shadow-inner">
                                                                <input type="text" placeholder="Nombre del Botón..." className="w-full bg-transparent border-b border-white/10 px-2 py-2 text-white focus:outline-none focus:border-white/50 text-sm font-bold" value={newLinkData.title} onChange={(e) => setNewLinkData({...newLinkData, title: e.target.value})} />
                                                                <input type="url" placeholder="https://..." className="w-full bg-transparent border-b border-white/10 px-2 py-2 text-white focus:outline-none focus:border-white/50 text-sm" value={newLinkData.url} onChange={(e) => setNewLinkData({...newLinkData, url: e.target.value})} />
                                                                <div className="flex gap-2 pt-2">
                                                                    <button onClick={() => addLink(category.id)} className="flex-1 theme-bg text-white py-3 rounded-xl text-sm font-black uppercase tracking-wider shadow-lg">Inyectar</button>
                                                                    <button onClick={() => setAddingLinkTo(null)} className="px-5 bg-white/5 text-white/50 hover:text-white hover:bg-white/10 rounded-xl transition-colors"><i className="fa-solid fa-times"></i></button>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <button onClick={() => setAddingLinkTo(category.id)} className="w-full py-4 rounded-2xl border border-dashed border-white/10 text-white/30 hover:text-white hover:border-white/30 hover:bg-white/5 text-[11px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2">
                                                                <i className="fa-solid fa-plus"></i> Inyectar Link
                                                            </button>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* POPUP DE BUZÓN (IZQUIERDA) */}
                    {settings.buzonEnabled && !isAdmin && (
                        <div className="fixed bottom-6 left-4 sm:left-6 z-40 animate-fade-in d-200">
                            <button onClick={() => setShowBuzon(true)} className="flex items-center gap-3 bg-black/60 backdrop-blur-2xl p-2 sm:p-2.5 sm:pl-5 rounded-full border border-white/10 hover:border-blue-500/50 hover:bg-black transition-all shadow-[0_10px_30px_rgba(0,0,0,0.8)] group">
                                <span className="text-white text-[10px] sm:text-[11px] font-black uppercase tracking-widest hidden md:block group-hover:text-blue-400 transition-colors">{settings.buzonTitle}</span>
                                <div className="w-10 h-10 sm:w-11 sm:h-11 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center text-white shadow-lg">
                                    <i className="fa-solid fa-bullhorn text-sm"></i>
                                </div>
                            </button>
                        </div>
                    )}

                    {/* MODAL DEL BUZÓN */}
                    {showBuzon && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:px-4 bg-black/80 backdrop-blur-xl anim-fade sm:anim-scale">
                            <div className="bg-[#0a0a0c] border border-white/10 p-6 sm:p-8 rounded-t-[2rem] sm:rounded-[2rem] w-full max-w-md relative shadow-[0_0_50px_rgba(59,130,246,0.15)] max-h-[90vh] overflow-y-auto no-scrollbar">
                                <button onClick={() => setShowBuzon(false)} className="absolute top-6 right-6 w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-white/50 hover:text-white hover:bg-white/10 transition-colors">
                                    <i className="fa-solid fa-xmark text-sm"></i>
                                </button>
                                
                                <div className="mb-8">
                                    <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500/20 to-cyan-500/20 border border-blue-500/30 flex items-center justify-center mb-5 shadow-inner">
                                        <i className="fa-solid fa-microphone-lines text-blue-400 text-xl"></i>
                                    </div>
                                    <h2 className="text-2xl font-black text-white tracking-tight">Envía tu Exclusiva</h2>
                                    <p className="text-white/50 text-xs mt-2 font-medium leading-relaxed">Tu aporte ciudadano es vital. La información llegará directo al equipo de edición en nuestra bóveda.</p>
                                </div>

                                {buzonStatus === 'success' ? (
                                    <div className="bg-green-500/10 border border-green-500/20 p-8 rounded-2xl text-center anim-scale">
                                        <i className="fa-solid fa-circle-check text-green-400 text-5xl mb-4 drop-shadow-[0_0_15px_rgba(74,222,128,0.4)]"></i>
                                        <h3 className="text-green-400 font-black text-xl mb-2">¡Recibido con éxito!</h3>
                                        <p className="text-green-400/70 text-sm font-medium">Nuestro equipo ya está revisando la información.</p>
                                    </div>
                                ) : (
                                    <form onSubmit={submitBuzon} className="space-y-4">
                                        <input type="text" placeholder="Tu Nombre o Alias" value={buzonForm.name} onChange={(e) => setBuzonForm({...buzonForm, name: e.target.value})} className="w-full bg-[#111] border border-white/5 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-blue-500/50 transition-all font-medium text-sm" required disabled={buzonStatus === 'sending'} />
                                        
                                        <div className="grid grid-cols-3 gap-2">
                                            {['noticia', 'evento', 'alerta'].map(type => (
                                                <button type="button" key={type} onClick={() => setBuzonForm({...buzonForm, type})} className={`py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border ${buzonForm.type === type ? 'border-blue-500 bg-blue-500/20 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)]' : 'border-white/5 bg-[#111] text-white/40 hover:bg-white/5'}`} disabled={buzonStatus === 'sending'}>
                                                    {type}
                                                </button>
                                            ))}
                                        </div>

                                        <textarea placeholder="Detalla lo sucedido, fechas, lugares..." value={buzonForm.message} onChange={(e) => setBuzonForm({...buzonForm, message: e.target.value})} rows="4" className="w-full bg-[#111] border border-white/5 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-blue-500/50 transition-all font-medium text-sm resize-none" required disabled={buzonStatus === 'sending'}></textarea>

                                        <a href={generateBuzonWaLink()} target="_blank" rel="noopener noreferrer" className="flex items-center justify-between bg-[#111] border border-green-500/30 p-4 rounded-xl hover:bg-green-500/10 transition-colors mt-2 group">
                                            <div className="flex items-center gap-3">
                                                <i className="fa-solid fa-image text-green-400 group-hover:scale-110 transition-transform"></i>
                                                <span className="text-green-400 text-[10px] font-black uppercase tracking-widest">¿Tienes fotos o videos?</span>
                                            </div>
                                            <i className="fa-brands fa-whatsapp text-green-400 text-xl group-hover:scale-110 transition-transform"></i>
                                        </a>

                                        <button type="submit" disabled={buzonStatus === 'sending'} className="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-black py-4 rounded-xl mt-6 transition-transform active:scale-95 uppercase tracking-wider text-sm flex items-center justify-center gap-2 shadow-[0_10px_20px_rgba(59,130,246,0.3)]">
                                            {buzonStatus === 'sending' ? <i className="fa-solid fa-spinner animate-spin"></i> : <><i className="fa-solid fa-paper-plane"></i> Enviar Exclusiva</>}
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* POPUP DE VENTAS / CTA (DERECHA) */}
                    {settings.ctaEnabled && !isAdmin && (
                        <div className="fixed bottom-6 right-4 sm:right-6 z-40 animate-fade-in d-300 max-w-[260px] sm:max-w-[280px]">
                            <a href={generateWaLink()} target="_blank" rel="noopener noreferrer" className="block p-1 rounded-full theme-bg cta-pulse transition-transform hover:scale-105 active:scale-95 shadow-[0_10px_30px_rgba(0,0,0,0.8)]">
                                <div className="bg-[#0a0a0c] p-2 sm:p-2.5 pr-4 sm:pr-5 rounded-full flex items-center gap-3">
                                    <div className="w-10 h-10 sm:w-11 sm:h-11 rounded-full theme-bg flex items-center justify-center text-white text-xl flex-shrink-0 shadow-inner">
                                        <i className="fa-brands fa-whatsapp"></i>
                                    </div>
                                    <div>
                                        <p className="text-white text-[10px] sm:text-[11px] font-black leading-tight tracking-wide">{settings.ctaText}</p>
                                    </div>
                                </div>
                            </a>
                        </div>
                    )}

                    {/* MODAL LOGIN BÓVEDA */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center px-4 bg-black/90 backdrop-blur-2xl anim-scale">
                            <div className="bg-[#0a0a0c] border border-white/10 p-8 sm:p-10 rounded-[2rem] w-full max-w-sm relative shadow-2xl">
                                <button onClick={() => setShowLogin(false)} className="absolute top-6 right-6 w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-white/30 hover:text-white transition-colors">
                                    <i className="fa-solid fa-xmark text-sm"></i>
                                </button>
                                <div className="mb-10 text-center">
                                    <div className="w-16 h-16 mx-auto rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center mb-6 shadow-inner">
                                        <i className="fa-solid fa-lock text-white/50 text-2xl"></i>
                                    </div>
                                    <h2 className="text-2xl font-black text-white tracking-tight">Acceso CEO</h2>
                                    <p className="text-white/40 text-[10px] mt-2 font-black uppercase tracking-widest">Nivel de Bóveda Requerido</p>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input type="text" placeholder="Usuario" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full bg-[#111] border border-white/5 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-white/20 transition-all font-bold text-center" required />
                                    <input type="password" placeholder="Contraseña" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-[#111] border border-white/5 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-white/20 transition-all font-bold text-center tracking-[0.3em]" required />
                                    {loginError && <div className="text-red-400 text-xs text-center font-bold mt-2">{loginError}</div>}
                                    <button type="submit" className="w-full bg-white text-black hover:bg-gray-200 font-black py-4 rounded-xl mt-6 transition-transform active:scale-95 uppercase tracking-wider text-sm shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                                        Desbloquear
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const style = document.createElement('style');
        style.innerHTML = `.theme-peer-checked:checked ~ div { background-color: rgb(var(--primary-rgb)); }`;
        document.head.appendChild(style);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
