<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soy Tomé Hub | Ecosistema Premium</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome 6.4.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CORE BLACK LABEL DESIGN SYSTEM */
        :root {
            --primary-rgb: 217, 70, 239; 
            --bg-color: #020202; 
        }

        body { 
            background-color: var(--bg-color); 
            color: #e2e8f0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Glassmorphism Premium */
        .glass-panel { 
            background: rgba(20, 20, 22, 0.4); 
            backdrop-filter: blur(32px); 
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 20px 40px -10px rgba(0, 0, 0, 0.8);
            border-radius: 24px;
        }
        
        .glass-panel:hover {
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 20px 50px -10px rgba(var(--primary-rgb), 0.15);
        }

        /* Animaciones */
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { 0% { opacity: 0; transform: scale(0.92); } 100% { opacity: 1; transform: scale(1); } }
        
        .anim-fade { animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .anim-scale { animation: scaleIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        
        .d-100 { animation-delay: 100ms; } .d-200 { animation-delay: 200ms; } .d-300 { animation-delay: 300ms; }

        .theme-glow { box-shadow: 0 0 50px rgba(var(--primary-rgb), 0.25); }
        .theme-text { color: rgb(var(--primary-rgb)); }
        .theme-bg { background-color: rgb(var(--primary-rgb)); }
        .theme-border { border-color: rgba(var(--primary-rgb), 0.5); }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(var(--primary-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0); }
        }
        .cta-pulse { animation: pulseGlow 2.5s infinite; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Estilo para los botones flotantes en móvil para evitar solapamiento */
        @media (max-width: 640px) {
            .floating-controls {
                display: flex;
                flex-direction: column;
                gap: 12px;
                bottom: 20px;
                right: 16px;
                left: 16px;
                align-items: flex-end;
            }
            .floating-btn-left {
                position: relative;
                bottom: 0;
                left: 0;
                width: 100%;
                justify-content: center;
            }
            .floating-btn-right {
                position: relative;
                bottom: 0;
                right: 0;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = window.React;
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const myFirebaseConfig = {
            apiKey: "AIzaSyCYQHwLpWxQxYj8Lk7GLAQT3c2_YaFs8Ew",
            authDomain: "soy-tome.firebaseapp.com",
            projectId: "soy-tome",
            storageBucket: "soy-tome.firebasestorage.app",
            messagingSenderId: "381653906684",
            appId: "1:381653906684:web:1c0a213ab4364fbed81379"
        };
        
        const isCanvas = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isCanvas ? JSON.parse(__firebase_config) : myFirebaseConfig;
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'soytome-prod';

        const getCatsPath = () => isCanvas ? `artifacts/${appId}/public/data/categorias` : 'hub_categorias';
        const getSettingsPath = () => isCanvas ? `artifacts/${appId}/public/data/config` : 'hub_settings';
        const getBuzonPath = () => isCanvas ? `artifacts/${appId}/public/data/buzon` : 'hub_buzon';

        const THEMES = {
            magenta: { name: 'Magenta Cyber', rgb: '217, 70, 239' },
            coral: { name: 'Coral Sunset', rgb: '251, 113, 133' },
            cyan: { name: 'Cyan Matrix', rgb: '6, 182, 212' },
            purple: { name: 'Púrpura Neón', rgb: '168, 85, 247' },
            emerald: { name: 'Esmeralda', rgb: '16, 185, 129' },
            gold: { name: 'Oro Premium', rgb: '234, 179, 8' }
        };

        const LAYOUTS = {
            grid: { name: 'Bento Grid', icon: 'fa-border-all' },
            list: { name: 'Directorio VIP', icon: 'fa-list-ul' }
        };

        const ANIMATIONS = {
            fade: { name: 'Elevación Premium', class: 'anim-fade' },
            scale: { name: 'Impacto Frontal', class: 'anim-scale' }
        };

        // CORRECCIÓN: Prefijos fa-brands para logos sociales
        const ICONS = [
            { id: 'fa-whatsapp', class: 'fa-brands fa-whatsapp' },
            { id: 'fa-facebook', class: 'fa-brands fa-facebook' },
            { id: 'fa-instagram', class: 'fa-brands fa-instagram' },
            { id: 'fa-tiktok', class: 'fa-brands fa-tiktok' },
            { id: 'fa-youtube', class: 'fa-brands fa-youtube' },
            { id: 'fa-threads', class: 'fa-brands fa-threads' },
            { id: 'fa-globe', class: 'fa-solid fa-globe' },
            { id: 'fa-users', class: 'fa-solid fa-users' },
            { id: 'fa-bullhorn', class: 'fa-solid fa-bullhorn' },
            { id: 'fa-newspaper', class: 'fa-regular fa-newspaper' },
            { id: 'fa-link', class: 'fa-solid fa-link' },
            { id: 'fa-bolt', class: 'fa-solid fa-bolt' }
        ];

        const DEFAULT_SETTINGS = {
            theme: 'magenta',
            layout: 'grid',
            animation: 'fade',
            logoUrl: '',
            ceoPhoto: '',
            ceoName: 'Ian',
            ceoRole: 'CEO & Founder Soy Tomé',
            ceoBio: 'Líder en comunicación digital y marketing de alto impacto.',
            showCeo: true,
            ctaEnabled: true,
            ctaText: 'Si no te ven, no existes. Aumenta tu visibilidad.',
            ctaPhone: '56900000000',
            ctaMessage: 'Hola Ian, quiero publicidad Black Label en Soy Tomé.',
            buzonEnabled: true,
            buzonTitle: 'Buzón de Exclusivas',
            buzonWa: '56900000000'
        };

        function App() {
            const [user, setUser] = useState(null);
            const [categories, setCategories] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [adminTab, setAdminTab] = useState('links'); 

            const [showBuzon, setShowBuzon] = useState(false);
            const [buzonForm, setBuzonForm] = useState({ name: '', type: 'noticia', message: '' });
            const [buzonStatus, setBuzonStatus] = useState('idle'); 
            const [buzonReports, setBuzonReports] = useState([]); 

            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [newCatTitle, setNewCatTitle] = useState('');
            const [newCatIcon, setNewCatIcon] = useState('fa-globe');
            const [editingCategory, setEditingCategory] = useState(null);
            const [editCatTitle, setEditCatTitle] = useState('');

            const [addingLinkTo, setAddingLinkTo] = useState(null);
            const [newLinkData, setNewLinkData] = useState({ title: '', url: '' });
            const [editingLinkObj, setEditingLinkObj] = useState(null); 
            const [editLinkData, setEditLinkData] = useState({ title: '', url: '' });

            const [systemError, setSystemError] = useState('');

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (isCanvas && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth bypass", e);
                    }
                };
                initAuth();
                const unsubAuth = onAuthStateChanged(auth, setUser);
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubCats = onSnapshot(collection(db, getCatsPath()), (snapshot) => {
                    const loaded = [];
                    snapshot.forEach(doc => loaded.push({ id: doc.id, ...doc.data() }));
                    loaded.sort((a, b) => (a.order || 0) - (b.order || 0) || a.id.localeCompare(b.id));
                    setCategories(loaded);
                }, (e) => setSystemError("candado_bd"));

                const unsubSettings = onSnapshot(doc(db, getSettingsPath(), 'global'), (docSnap) => {
                    if (docSnap.exists()) {
                        setSettings({ ...DEFAULT_SETTINGS, ...docSnap.data() });
                    } else {
                        setDoc(doc(db, getSettingsPath(), 'global'), DEFAULT_SETTINGS);
                    }
                    setIsLoading(false);
                }, (e) => setSystemError("candado_bd"));

                const unsubBuzon = onSnapshot(collection(db, getBuzonPath()), (snapshot) => {
                    const loaded = [];
                    snapshot.forEach(doc => loaded.push({ id: doc.id, ...doc.data() }));
                    loaded.sort((a, b) => b.timestamp - a.timestamp); 
                    setBuzonReports(loaded);
                });

                return () => { unsubCats(); unsubSettings(); unsubBuzon(); };
            }, [user]);

            useEffect(() => {
                if (THEMES[settings.theme]) {
                    document.documentElement.style.setProperty('--primary-rgb', THEMES[settings.theme].rgb);
                }
            }, [settings.theme]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'ian' && password === 'ian123') {
                    setIsAdmin(true); setShowLogin(false); setLoginError(''); setUsername(''); setPassword('');
                } else {
                    setLoginError('Credenciales erróneas.');
                }
            };

            const updateSettings = async (newConfig) => {
                const updated = { ...settings, ...newConfig };
                setSettings(updated); 
                await setDoc(doc(db, getSettingsPath(), 'global'), updated);
            };

            // LÓGICA BUZÓN: Firestore + Redirección WhatsApp
            const submitBuzon = async (e) => {
                e.preventDefault();
                if (!buzonForm.name.trim() || !buzonForm.message.trim()) return;
                
                setBuzonStatus('sending');
                try {
                    // Guardar registro
                    await addDoc(collection(db, getBuzonPath()), {
                        ...buzonForm,
                        timestamp: Date.now(),
                        status: 'unread'
                    });

                    // Construir link WhatsApp con el detalle
                    const text = `🚨 *REPORTE CIUDADANO* 🚨\n\n*De:* ${buzonForm.name}\n*Tipo:* ${buzonForm.type.toUpperCase()}\n*Detalle:* ${buzonForm.message}\n\n_Enviado desde Soy Tomé Hub_`;
                    const waLink = `https://wa.me/${settings.buzonWa.replace(/\D/g, '')}?text=${encodeURIComponent(text)}`;
                    
                    setBuzonStatus('success');
                    setTimeout(() => {
                        window.open(waLink, '_blank');
                        setShowBuzon(false);
                        setBuzonStatus('idle');
                        setBuzonForm({ name: '', type: 'noticia', message: '' });
                    }, 1500);
                } catch (error) {
                    setBuzonStatus('error');
                }
            };

            // CRUD Categorías y Enlaces
            const addCategory = async () => {
                if (!newCatTitle.trim()) return;
                const newId = `cat-${Date.now()}`;
                const newOrder = categories.length > 0 ? Math.max(...categories.map(c => c.order || 0)) + 1 : 0;
                await setDoc(doc(db, getCatsPath(), newId), { title: newCatTitle, iconId: newCatIcon, order: newOrder, links: [] });
                setNewCatTitle('');
            };

            const saveCategoryEdit = async (catId) => {
                const cat = categories.find(c => c.id === catId);
                if (cat) await setDoc(doc(db, getCatsPath(), catId), { ...cat, title: editCatTitle });
                setEditingCategory(null);
            };

            const deleteCategory = async (catId) => {
                if (confirm('¿Eliminar categoría?')) await deleteDoc(doc(db, getCatsPath(), catId));
            };

            const moveCategory = async (index, direction) => {
                const catA = categories[index];
                const catB = categories[index + direction];
                await setDoc(doc(db, getCatsPath(), catA.id), { ...catA, order: catB.order });
                await setDoc(doc(db, getCatsPath(), catB.id), { ...catB, order: catA.order });
            };

            const addLink = async (catId) => {
                const cat = categories.find(c => c.id === catId);
                if (cat) await setDoc(doc(db, getCatsPath(), catId), { ...cat, links: [...cat.links, { id: `link-${Date.now()}`, ...newLinkData }] });
                setNewLinkData({ title: '', url: '' }); setAddingLinkTo(null);
            };

            const saveLinkEdit = async () => {
                const { catId, linkId } = editingLinkObj;
                const cat = categories.find(c => c.id === catId);
                if (cat) await setDoc(doc(db, getCatsPath(), catId), { ...cat, links: cat.links.map(l => l.id === linkId ? { ...l, ...editLinkData } : l) });
                setEditingLinkObj(null);
            };

            const deleteLink = async (catId, linkId) => {
                const cat = categories.find(c => c.id === catId);
                if (cat) await setDoc(doc(db, getCatsPath(), catId), { ...cat, links: cat.links.filter(l => l.id !== linkId) });
            };

            const moveLink = async (catId, linkIndex, direction) => {
                const cat = categories.find(c => c.id === catId);
                const newLinks = [...cat.links];
                const temp = newLinks[linkIndex];
                newLinks[linkIndex] = newLinks[linkIndex + direction];
                newLinks[linkIndex + direction] = temp;
                await setDoc(doc(db, getCatsPath(), catId), { ...cat, links: newLinks });
            };

            const getAnimClass = () => ANIMATIONS[settings.animation]?.class || 'anim-fade';
            const generateWaLink = () => `https://wa.me/${settings.ctaPhone.replace(/\D/g, '')}?text=${encodeURIComponent(settings.ctaMessage)}`;

            if (systemError) return <div className="min-h-screen bg-black flex items-center justify-center text-red-500 font-bold p-10 text-center">Error de Conexión: Revisa las Reglas de Firestore.</div>;
            if (isLoading) return <div className="min-h-screen bg-black flex items-center justify-center text-white/20 font-bold tracking-[0.5em] animate-pulse">INICIALIZANDO MOTOR</div>;

            return (
                <div className="min-h-screen relative overflow-hidden pb-40">
                    <div className="fixed inset-0 pointer-events-none z-0 opacity-40">
                        <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full blur-[160px] theme-bg opacity-30"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full blur-[160px] theme-bg opacity-20"></div>
                    </div>

                    <div className="relative z-50 flex justify-end p-4 max-w-5xl mx-auto">
                        {isAdmin ? (
                            <button onClick={() => setIsAdmin(false)} className="px-5 py-2.5 rounded-full bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-black uppercase tracking-widest backdrop-blur-md">SALIR CEO</button>
                        ) : (
                            <button onClick={() => setShowLogin(true)} className="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-white/30 hover:text-white transition-all"><i className="fa-solid fa-fingerprint"></i></button>
                        )}
                    </div>

                    <main className="relative z-30 max-w-4xl mx-auto px-4 pt-2">
                        <div className={`${getAnimClass()} d-100 flex flex-col items-center text-center mb-12`}>
                            {settings.logoUrl ? (
                                <img src={settings.logoUrl} className="h-28 md:h-32 object-contain theme-glow rounded-3xl mb-8" />
                            ) : (
                                <div className="mb-10"><span className="text-7xl md:text-8xl font-black text-white tracking-tighter drop-shadow-[0_10px_20px_rgba(255,255,255,0.15)]">ST</span></div>
                            )}

                            {settings.showCeo && (
                                <div className="glass-panel p-6 max-w-md w-full relative group">
                                    <div className="relative z-10 flex flex-col items-center">
                                        {settings.ceoPhoto && <img src={settings.ceoPhoto} className="w-20 h-20 rounded-full object-cover border-2 theme-border mb-4" />}
                                        <h1 className="text-2xl font-black text-white mb-1">{settings.ceoName}</h1>
                                        <h2 className="theme-text text-[10px] font-black tracking-[0.2em] uppercase mb-4">{settings.ceoRole}</h2>
                                        <p className="text-white/60 text-sm leading-relaxed">{settings.ceoBio}</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        {isAdmin && (
                            <div className="mb-20 rounded-[2rem] bg-zinc-950 border border-white/10 overflow-hidden">
                                <div className="flex border-b border-white/5 overflow-x-auto bg-black/20">
                                    {['links', 'design', 'profile', 'marketing', 'inbox'].map(tab => (
                                        <button key={tab} onClick={() => setAdminTab(tab)} className={`flex-1 min-w-[100px] py-4 text-[10px] uppercase tracking-widest font-black transition-all ${adminTab === tab ? 'text-white border-b-2 theme-border bg-white/5' : 'text-white/40'}`}>{tab}</button>
                                    ))}
                                </div>
                                <div className="p-6">
                                    {adminTab === 'links' && (
                                        <div className="space-y-4">
                                            <div className="flex gap-2">
                                                <input type="text" placeholder="Nueva Categoría" className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white" value={newCatTitle} onChange={(e) => setNewCatTitle(e.target.value)} />
                                                <button onClick={addCategory} className="theme-bg text-white px-6 rounded-xl font-bold">CREAR</button>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {ICONS.map(i => (
                                                    <button key={i.id} onClick={() => setNewCatIcon(i.id)} className={`w-10 h-10 rounded-xl flex items-center justify-center border transition-all ${newCatIcon === i.id ? 'theme-bg text-white' : 'bg-white/5 border-white/10 text-white/40'}`}>
                                                        <i className={i.class}></i>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    {adminTab === 'design' && (
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                            {Object.entries(THEMES).map(([key, t]) => (
                                                <button key={key} onClick={() => updateSettings({ theme: key })} className={`p-4 rounded-xl border ${settings.theme === key ? 'border-white bg-white/10' : 'border-white/5'}`}>
                                                    <div className="w-full h-4 rounded mb-2" style={{backgroundColor: `rgb(${t.rgb})`}}></div>
                                                    <span className="text-[10px] font-bold text-white uppercase">{t.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                    {adminTab === 'profile' && (
                                        <div className="space-y-3">
                                            <input type="text" placeholder="URL Foto CEO" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" value={settings.ceoPhoto} onChange={(e) => updateSettings({ceoPhoto: e.target.value})} />
                                            <input type="text" placeholder="Nombre CEO" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" value={settings.ceoName} onChange={(e) => updateSettings({ceoName: e.target.value})} />
                                            <textarea placeholder="Bio" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" value={settings.ceoBio} onChange={(e) => updateSettings({ceoBio: e.target.value})} />
                                        </div>
                                    )}
                                    {adminTab === 'marketing' && (
                                        <div className="space-y-3">
                                            <textarea placeholder="Copy Ventas" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" value={settings.ctaText} onChange={(e) => updateSettings({ctaText: e.target.value})} />
                                            <input type="text" placeholder="WhatsApp Ventas" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" value={settings.ctaPhone} onChange={(e) => updateSettings({ctaPhone: e.target.value})} />
                                        </div>
                                    )}
                                    {adminTab === 'inbox' && (
                                        <div className="space-y-4">
                                            {buzonReports.map(r => (
                                                <div key={r.id} className="bg-white/5 p-4 rounded-xl border border-white/10 flex justify-between items-start">
                                                    <div>
                                                        <div className="flex gap-2 mb-1"><span className="text-[10px] theme-bg text-white px-1.5 rounded">{r.type}</span><span className="text-white font-bold">{r.name}</span></div>
                                                        <p className="text-white/60 text-sm">{r.message}</p>
                                                    </div>
                                                    <button onClick={() => deleteReport(r.id)} className="text-red-500/50"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        <div className={settings.layout === 'grid' ? "grid grid-cols-1 md:grid-cols-2 gap-6" : "flex flex-col space-y-6"}>
                            {categories.map((cat, idx) => (
                                <div key={cat.id} className={`${getAnimClass()} d-200 glass-panel p-6 relative group overflow-hidden`}>
                                    <div className="flex items-center justify-between mb-8">
                                        {editingCategory === cat.id ? (
                                            <div className="flex gap-2 w-full"><input autoFocus className="flex-1 bg-black border border-white/20 rounded-xl px-4 py-2 text-white font-bold" value={editCatTitle} onChange={(e)=>setEditCatTitle(e.target.value)} /><button onClick={() => saveCategoryEdit(cat.id)} className="theme-bg text-white px-4 rounded-xl font-bold">OK</button></div>
                                        ) : (
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-xl text-white">
                                                    {/* CORRECCIÓN: Renderizado dinámico de icono FontAwesome */}
                                                    <i className={(ICONS.find(i => i.id === cat.iconId)?.class) || 'fa-solid fa-link'}></i>
                                                </div>
                                                <h3 className="text-xl font-black text-white">{cat.title}</h3>
                                            </div>
                                        )}
                                        {isAdmin && !editingCategory && (
                                            <div className="flex items-center gap-2 bg-black/40 p-2 rounded-xl border border-white/10">
                                                <button onClick={() => moveCategory(idx, -1)} disabled={idx===0} className="text-white/20 hover:text-white disabled:opacity-0"><i className="fa-solid fa-chevron-up"></i></button>
                                                <button onClick={() => {setEditCatTitle(cat.title); setEditingCategory(cat.id)}} className="text-blue-400/50"><i className="fa-solid fa-pen"></i></button>
                                                <button onClick={() => deleteCategory(cat.id)} className="text-red-400/50"><i className="fa-solid fa-trash"></i></button>
                                                <button onClick={() => moveCategory(idx, 1)} disabled={idx===categories.length-1} className="text-white/20 hover:text-white disabled:opacity-0"><i className="fa-solid fa-chevron-down"></i></button>
                                            </div>
                                        )}
                                    </div>

                                    <div className="space-y-3">
                                        {cat.links.map((link, lIdx) => (
                                            <div key={link.id} className="flex gap-2">
                                                <a href={link.url} target="_blank" className="flex-1 flex justify-between items-center p-4 rounded-2xl bg-white/5 border border-white/5 hover:border-white/20 transition-all group/l">
                                                    <span className="font-bold text-white/80 group-hover/l:text-white">{link.title}</span>
                                                    <i className="fa-solid fa-arrow-right text-white/20 -rotate-45 group-hover/l:text-white transition-all"></i>
                                                </a>
                                                {isAdmin && (
                                                    <div className="flex flex-col gap-1">
                                                        <button onClick={() => deleteLink(cat.id, link.id)} className="w-8 h-full bg-red-500/10 text-red-500 rounded-lg text-xs"><i className="fa-solid fa-x"></i></button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        {isAdmin && (
                                            <div className="mt-4">
                                                {addingLinkTo === cat.id ? (
                                                    <div className="p-4 bg-white/5 rounded-xl border border-white/10 space-y-2">
                                                        <input type="text" placeholder="Nombre Link" className="w-full bg-black rounded p-2 text-white" value={newLinkData.title} onChange={e=>setNewLinkData({...newLinkData, title: e.target.value})} />
                                                        <input type="url" placeholder="URL" className="w-full bg-black rounded p-2 text-white" value={newLinkData.url} onChange={e=>setNewLinkData({...newLinkData, url: e.target.value})} />
                                                        <button onClick={() => addLink(cat.id)} className="w-full theme-bg py-2 rounded font-bold">GUARDAR LINK</button>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => setAddingLinkTo(cat.id)} className="w-full py-3 border border-dashed border-white/20 rounded-2xl text-white/20 hover:text-white hover:border-white/40 text-xs font-black">+ INYECTAR LINK</button>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* ACTION HUB FLOTANTE: Buzón y Ventas */}
                    <div className="fixed bottom-6 left-0 right-0 z-40 px-6 floating-controls">
                        {/* Buzón (Izquierda en Desktop, Centrado en Móvil) */}
                        {settings.buzonEnabled && !isAdmin && (
                            <button onClick={() => setShowBuzon(true)} className="floating-btn-left flex items-center gap-3 bg-black/80 backdrop-blur-xl p-2.5 pl-5 rounded-full border border-white/10 hover:border-blue-500 shadow-2xl transition-all group">
                                <span className="text-white text-[10px] font-black uppercase tracking-widest hidden sm:block group-hover:text-blue-400">{settings.buzonTitle}</span>
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center text-white"><i className="fa-solid fa-bullhorn"></i></div>
                            </button>
                        )}

                        {/* Ventas (Derecha en Desktop, Centrado en Móvil) */}
                        {settings.ctaEnabled && !isAdmin && (
                            <a href={generateWaLink()} target="_blank" className="floating-btn-right block p-1 rounded-full theme-bg cta-pulse shadow-2xl transition-transform hover:scale-105 active:scale-95">
                                <div className="bg-[#0a0a0c] p-2 pr-5 rounded-full flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full theme-bg flex items-center justify-center text-white"><i className="fa-brands fa-whatsapp"></i></div>
                                    <p className="text-white text-[11px] font-black leading-tight max-w-[150px]">{settings.ctaText}</p>
                                </div>
                            </a>
                        )}
                    </div>

                    {/* MODAL BUZÓN */}
                    {showBuzon && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/90 backdrop-blur-xl p-4 anim-fade">
                            <div className="bg-[#0a0a0c] border border-white/10 p-8 rounded-[2rem] w-full max-w-md relative shadow-2xl">
                                <button onClick={() => setShowBuzon(false)} className="absolute top-6 right-6 text-white/30"><i className="fa-solid fa-xmark text-xl"></i></button>
                                <div className="mb-8">
                                    <div className="w-14 h-14 rounded-2xl theme-bg bg-opacity-20 flex items-center justify-center mb-5"><i className="fa-solid fa-microphone-lines theme-text text-xl"></i></div>
                                    <h2 className="text-2xl font-black text-white tracking-tight">Reporte Ciudadano</h2>
                                    <p className="text-white/50 text-xs mt-2 font-medium leading-relaxed">Tu información será enviada directamente al equipo de prensa de Soy Tomé vía WhatsApp.</p>
                                </div>

                                {buzonStatus === 'success' ? (
                                    <div className="text-center py-10"><i className="fa-solid fa-circle-check text-green-400 text-6xl mb-4 animate-bounce"></i><p className="text-white font-bold uppercase tracking-widest text-sm">Abriendo WhatsApp...</p></div>
                                ) : (
                                    <form onSubmit={submitBuzon} className="space-y-4">
                                        <input type="text" placeholder="Tu Nombre" value={buzonForm.name} onChange={(e) => setBuzonForm({...buzonForm, name: e.target.value})} className="w-full bg-[#111] border border-white/5 rounded-xl px-5 py-4 text-white outline-none focus:border-blue-500 transition-all" required />
                                        <div className="grid grid-cols-3 gap-2">
                                            {['noticia', 'evento', 'alerta'].map(type => (
                                                <button type="button" key={type} onClick={() => setBuzonForm({...buzonForm, type})} className={`py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border ${buzonForm.type === type ? 'border-blue-500 bg-blue-500/20 text-blue-400' : 'border-white/5 bg-[#111] text-white/40 hover:bg-white/5'}`}>{type}</button>
                                            ))}
                                        </div>
                                        <textarea placeholder="Explica los detalles aquí..." value={buzonForm.message} onChange={(e) => setBuzonForm({...buzonForm, message: e.target.value})} rows="4" className="w-full bg-[#111] border border-white/5 rounded-xl px-5 py-4 text-white outline-none focus:border-blue-500 transition-all resize-none" required></textarea>

                                        {/* Botón visual de carga de archivos (puesto que no se inyectan a WA, instruimos al usuario) */}
                                        <div className="border border-dashed border-white/10 p-4 rounded-xl flex items-center justify-between group hover:border-white/30 transition-all cursor-pointer">
                                            <div className="flex items-center gap-3"><i className="fa-solid fa-paperclip text-white/30 group-hover:text-white"></i><span className="text-[10px] text-white/40 font-black uppercase">Sube fotos/videos en el chat</span></div>
                                            <i className="fa-brands fa-whatsapp text-green-500"></i>
                                        </div>

                                        <button type="submit" disabled={buzonStatus === 'sending'} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl mt-4 transition-transform active:scale-95 uppercase tracking-wider text-sm flex items-center justify-center gap-2">
                                            {buzonStatus === 'sending' ? <i className="fa-solid fa-spinner animate-spin"></i> : <><i className="fa-solid fa-paper-plane"></i> ENVIAR A PRENSA</>}
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* MODAL LOGIN */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center px-4 bg-black/90 backdrop-blur-2xl">
                            <div className="bg-[#0a0a0c] border border-white/10 p-10 rounded-[2rem] w-full max-w-sm relative shadow-2xl">
                                <button onClick={() => setShowLogin(false)} className="absolute top-6 right-6 text-white/30"><i className="fa-solid fa-xmark text-xl"></i></button>
                                <div className="mb-10 text-center"><div className="w-16 h-16 mx-auto rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center mb-6 shadow-inner"><i className="fa-solid fa-lock text-white/50 text-2xl"></i></div><h2 className="text-2xl font-black text-white tracking-tight">ACCESO CEO</h2></div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input type="text" placeholder="Usuario" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full bg-[#111] border border-white/5 rounded-xl px-5 py-4 text-white text-center font-bold" required />
                                    <input type="password" placeholder="Clave" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-[#111] border border-white/5 rounded-xl px-5 py-4 text-white text-center font-bold tracking-[0.3em]" required />
                                    {loginError && <div className="text-red-400 text-xs text-center font-bold">{loginError}</div>}
                                    <button type="submit" className="w-full bg-white text-black font-black py-4 rounded-xl mt-6 uppercase tracking-wider text-sm">DESBLOQUEAR</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const style = document.createElement('style');
        style.innerHTML = `.theme-peer-checked:checked ~ div { background-color: rgb(var(--primary-rgb)); }`;
        document.head.appendChild(style);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
