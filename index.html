<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soy Tomé Lux | Exclusive</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- Reset & Variables --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        
        :root {
            --bg-color: #030303;
            --glass-bg: rgba(15, 15, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent-gold: #D4AF37;
            --accent-gold-glow: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Fondo Épico Animado (Lux Auroras) --- */
        .epic-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #030303;
            z-index: -2;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--accent-gold-glow), transparent 70%);
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.1), transparent 70%);
            bottom: -150px; right: -100px;
            animation-delay: -5s;
        }
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            z-index: -1; pointer-events: none;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, 50px) scale(0.9); }
        }

        /* --- Layout --- */
        .container {
            width: 100%; max-width: 450px; padding: 60px 20px 40px;
            display: flex; flex-direction: column; align-items: center; z-index: 1;
        }

        /* --- Minimalist ST Logo --- */
        .header { text-align: center; margin-bottom: 40px; }
        .st-logo {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #ffffff 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 10px 15px rgba(212, 175, 55, 0.2));
            display: inline-block;
        }
        .brand-subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* --- Enlaces Dinámicos --- */
        .links-wrapper { width: 100%; display: flex; flex-direction: column; gap: 16px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 20px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 16px; color: var(--text-main); text-decoration: none;
            font-weight: 400; font-size: 1.1rem; letter-spacing: 0.5px;
            backdrop-filter: blur(12px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .link-btn i { position: absolute; left: 24px; color: var(--accent-gold); font-size: 1.3rem; transition: transform 0.3s ease; }
        .link-btn:hover {
            border-color: rgba(212, 175, 55, 0.3); background: rgba(212, 175, 55, 0.05);
            transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }
        .link-btn:hover i { transform: scale(1.2); }

        /* --- Redes Sociales --- */
        .social-icons { display: flex; gap: 25px; margin-top: 50px; }
        .social-btn { color: var(--text-muted); font-size: 1.5rem; transition: all 0.3s ease; text-decoration: none; }
        .social-btn:hover { color: var(--accent-gold); transform: translateY(-3px); filter: drop-shadow(0 5px 10px rgba(212,175,55,0.4)); }

        /* --- Panel Admin UI --- */
        .admin-trigger {
            position: fixed; bottom: 20px; right: 20px; color: rgba(255,255,255,0.05);
            font-size: 1.2rem; cursor: pointer; z-index: 100; transition: color 0.3s;
        }
        .admin-trigger:hover { color: var(--accent-gold); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-box {
            background: #080808; border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 30px; width: 95%; max-width: 500px; box-shadow: 0 25px 50px rgba(0,0,0,1);
            transform: translateY(20px); transition: transform 0.3s; max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-box h3 { font-size: 1.5rem; color: var(--accent-gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; font-weight: 900;}
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: var(--text-muted); margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; font-weight: 700;}
        .input-group input {
            width: 100%; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border); color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: var(--accent-gold); }
        
        .btn-primary { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--accent-gold); color: #000; font-weight: 800; cursor: pointer; margin-top: 10px; transition: background 0.2s;}
        .btn-primary:hover { background: #fff; }
        .btn-secondary { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: transparent; color: var(--text-main); font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-danger { background: rgba(220, 38, 38, 0.1); color: #ef4444; border: 1px solid rgba(220, 38, 38, 0.3); padding: 10px; border-radius: 8px; cursor: pointer; }
        
        .close-modal { color: var(--text-muted); text-align: center; display: block; margin-top: 20px; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}
        .close-modal:hover { color: #fff; }

        /* Lista editable de links */
        .edit-link-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 15px; margin-bottom: 15px;
            display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
        }
        .edit-link-inputs { display: flex; flex-direction: column; gap: 10px; }

        /* --- Toast --- */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #fff; color: #000; padding: 12px 24px; border-radius: 30px;
            font-weight: 800; z-index: 3000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255,255,255,0.2);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Animación de Fondo Lux -->
    <div class="epic-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="noise-overlay"></div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Mensaje</div>

    <!-- Interfaz Principal -->
    <div class="container">
        <header class="header">
            <div class="st-logo">ST</div>
            <div class="brand-subtitle">Soy Tomé Lux</div>
        </header>

        <!-- Contenedor donde se inyectan los botones dinámicos -->
        <div class="links-wrapper" id="public-links-container">
            <!-- Los links se generan por JS -->
        </div>

        <div class="social-icons">
            <a href="#" id="soc-ig" class="social-btn" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" id="soc-tk" class="social-btn" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#" id="soc-fb" class="social-btn" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" id="soc-wa" class="social-btn" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </div>

    <!-- Trigger Admin Oculto -->
    <div class="admin-trigger" id="btn-open-login">
        <i class="fa-solid fa-key"></i>
    </div>

    <!-- Modal Login Estricto -->
    <div class="modal-overlay" id="modal-login">
        <div class="modal-box">
            <h3>Protocolo de Acceso</h3>
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="login-user" placeholder="Ingresa usuario">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <button class="btn-primary" id="btn-login">Autorizar</button>
            <span class="close-modal" id="btn-close-login">Cancelar</span>
        </div>
    </div>

    <!-- Modal Dashboard (CMS) -->
    <div class="modal-overlay" id="modal-dashboard">
        <div class="modal-box" style="max-width: 600px;">
            <h3>Panel Central</h3>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h4 style="color: #fff;">Tus Botones</h4>
                <button class="btn-secondary" id="btn-add-new" style="width: auto; margin: 0; padding: 6px 12px; font-size: 0.8rem;">+ Nuevo Enlace</button>
            </div>

            <!-- Contenedor editable de botones -->
            <div id="admin-links-container" style="margin-bottom: 30px;">
                <!-- Inputs generados por JS -->
            </div>

            <hr style="border-color: var(--glass-border); margin: 20px 0;">

            <h4 style="color: #fff; margin-bottom: 15px;">Redes Sociales</h4>
            <div class="input-group">
                <label>Instagram URL</label>
                <input type="text" id="input-soc-ig">
            </div>
            <div class="input-group">
                <label>TikTok URL</label>
                <input type="text" id="input-soc-tk">
            </div>
            <div class="input-group">
                <label>Facebook URL</label>
                <input type="text" id="input-soc-fb">
            </div>
            <div class="input-group">
                <label>WhatsApp URL</label>
                <input type="text" id="input-soc-wa">
            </div>

            <button class="btn-primary" id="btn-save-all" style="margin-top: 20px;">Guardar Configuración General</button>
            <span class="close-modal" id="btn-close-dashboard">Cerrar y Ver Cambios</span>
        </div>
    </div>

    <!-- Motor JavaScript (CMS Nativo) -->
    <script>
        const STORAGE_KEY = 'st_lux_dynamic_data';

        // Estado Global por Defecto
        let appData = {
            links: [
                { id: Date.now(), title: "Directorio Comercial", url: "https://soytomelux.cl", icon: "fa-store" },
                { id: Date.now() + 1, title: "Anunciar mi Negocio", url: "https://soytomelux.cl/unirse", icon: "fa-bolt" }
            ],
            socials: {
                ig: "https://instagram.com/comercio.tome",
                tk: "https://tiktok.com/@soytome",
                fb: "https://facebook.com/soytome",
                wa: "https://wa.me/56900000000"
            }
        };

        // UI Elements
        const publicContainer = document.getElementById('public-links-container');
        const adminContainer = document.getElementById('admin-links-container');
        const toast = document.getElementById('toast');

        // Función Principal: Cargar Memoria
        function initApp() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try { appData = JSON.parse(savedData); } catch (e) { console.error("Error leyendo datos"); }
            }
            renderPublicView();
        }

        // Renderizar Interfaz Pública
        function renderPublicView() {
            // Limpiar
            publicContainer.innerHTML = '';
            
            // Inyectar Botones
            appData.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url || '#';
                a.className = 'link-btn';
                a.target = '_blank';
                a.innerHTML = `<i class="fa-solid ${link.icon || 'fa-link'}"></i> ${link.title}`;
                publicContainer.appendChild(a);
            });

            // Inyectar Redes Sociales
            document.getElementById('soc-ig').href = appData.socials.ig || '#';
            document.getElementById('soc-tk').href = appData.socials.tk || '#';
            document.getElementById('soc-fb').href = appData.socials.fb || '#';
            document.getElementById('soc-wa').href = appData.socials.wa || '#';
        }

        // Renderizar Panel de Administración
        function renderAdminView() {
            adminContainer.innerHTML = '';
            
            // Renderizar Lista Editable
            appData.links.forEach(link => {
                const card = document.createElement('div');
                card.className = 'edit-link-card';
                card.innerHTML = `
                    <div class="edit-link-inputs">
                        <input type="text" class="link-edit-title" data-id="${link.id}" value="${link.title}" placeholder="Nombre del botón">
                        <input type="text" class="link-edit-url" data-id="${link.id}" value="${link.url}" placeholder="URL (Ej: https://...)">
                        <input type="text" class="link-edit-icon" data-id="${link.id}" value="${link.icon}" placeholder="Icono FontAwesome (Ej: fa-star)">
                    </div>
                    <button class="btn-danger btn-delete-link" data-id="${link.id}"><i class="fa-solid fa-trash"></i></button>
                `;
                adminContainer.appendChild(card);
            });

            // Setear Redes Sociales en inputs
            document.getElementById('input-soc-ig').value = appData.socials.ig || '';
            document.getElementById('input-soc-tk').value = appData.socials.tk || '';
            document.getElementById('input-soc-fb').value = appData.socials.fb || '';
            document.getElementById('input-soc-wa').value = appData.socials.wa || '';

            // Eventos para Botones de Borrar
            document.querySelectorAll('.btn-delete-link').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idToRemove = parseInt(e.currentTarget.getAttribute('data-id'));
                    appData.links = appData.links.filter(l => l.id !== idToRemove);
                    renderAdminView(); // Recargar panel visualmente
                });
            });
        }

        // Añadir Nuevo Enlace (Botón "+ Nuevo Enlace")
        document.getElementById('btn-add-new').addEventListener('click', () => {
            appData.links.push({
                id: Date.now(),
                title: "Nuevo Enlace",
                url: "https://",
                icon: "fa-arrow-right"
            });
            renderAdminView();
        });

        // Guardar Toda la Configuración
        document.getElementById('btn-save-all').addEventListener('click', () => {
            // Actualizar arreglo de links iterando sobre los inputs generados
            const linkCards = document.querySelectorAll('.edit-link-card');
            let updatedLinks = [];
            
            linkCards.forEach(card => {
                const titleInput = card.querySelector('.link-edit-title');
                const id = parseInt(titleInput.getAttribute('data-id'));
                
                updatedLinks.push({
                    id: id,
                    title: titleInput.value,
                    url: card.querySelector('.link-edit-url').value,
                    icon: card.querySelector('.link-edit-icon').value
                });
            });

            appData.links = updatedLinks;

            // Actualizar redes sociales
            appData.socials.ig = document.getElementById('input-soc-ig').value;
            appData.socials.tk = document.getElementById('input-soc-tk').value;
            appData.socials.fb = document.getElementById('input-soc-fb').value;
            appData.socials.wa = document.getElementById('input-soc-wa').value;

            // Guardar en persistencia y actualizar frontend
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
            renderPublicView();
            showToast("Plataforma Actualizada");
        });

        // Utilidad: Mostrar Notificación
        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- Lógica de Modales y Autenticación Fuerte ---
        const modalLogin = document.getElementById('modal-login');
        const modalDashboard = document.getElementById('modal-dashboard');

        document.getElementById('btn-open-login').addEventListener('click', () => modalLogin.classList.add('active'));
        document.getElementById('btn-close-login').addEventListener('click', () => modalLogin.classList.remove('active'));
        document.getElementById('btn-close-dashboard').addEventListener('click', () => modalDashboard.classList.remove('active'));

        // Validador de Credenciales Exactas
        document.getElementById('btn-login').addEventListener('click', () => {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            
            if (u === "Hola Ian" && p === "Ian4964@") {
                modalLogin.classList.remove('active');
                document.getElementById('login-user').value = "";
                document.getElementById('login-pass').value = "";
                
                // Preparar y mostrar Dashboard
                renderAdminView();
                setTimeout(() => modalDashboard.classList.add('active'), 300);
            } else {
                showToast("Acceso Denegado");
            }
        });

        // Ejecución Inicial
        initApp();
    </script>
</body>
</html>
```
