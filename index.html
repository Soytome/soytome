<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soy Tomé Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #030712; /* Slate 950 ultra oscuro */
            color: #e2e8f0; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        
        /* Animaciones Épicas */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes glowPulse {
            0% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); }
            50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.5); }
            100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); }
        }

        .animate-fade-in {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        /* Efecto Glassmorphism Premium */
        .glass-panel { 
            background: rgba(15, 23, 42, 0.4); /* Slate 900 con transparencia */
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .logo-glow {
            animation: glowPulse 3s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Base de datos de iconos disponibles
        const ICON_OPTIONS = [
            { id: 'fa-whatsapp', class: 'fa-brands fa-whatsapp', color: 'text-green-400', bg: 'bg-green-400/10' },
            { id: 'fa-facebook', class: 'fa-brands fa-facebook', color: 'text-blue-500', bg: 'bg-blue-500/10' },
            { id: 'fa-instagram', class: 'fa-brands fa-instagram', color: 'text-pink-500', bg: 'bg-pink-500/10' },
            { id: 'fa-tiktok', class: 'fa-brands fa-tiktok', color: 'text-white', bg: 'bg-white/10' },
            { id: 'fa-globe', class: 'fa-solid fa-globe', color: 'text-cyan-400', bg: 'bg-cyan-400/10' },
            { id: 'fa-users', class: 'fa-solid fa-users', color: 'text-purple-400', bg: 'bg-purple-400/10' }
        ];

        const INITIAL_DATA = [
            {
                id: 'cat-1',
                title: 'Grupos de WhatsApp',
                iconId: 'fa-whatsapp',
                links: [
                    { id: 'link-1', title: 'Avisos Tomé Oficial', url: 'https://chat.whatsapp.com/ejemplo1' },
                    { id: 'link-2', title: 'Feria de las Pulgas Tomé', url: 'https://chat.whatsapp.com/ejemplo2' }
                ]
            },
            {
                id: 'cat-2',
                title: 'Nuestras Redes',
                iconId: 'fa-instagram',
                links: [
                    { id: 'link-3', title: 'Instagram Soy Tomé', url: 'https://instagram.com/soytome' },
                    { id: 'link-4', title: 'Facebook Page Oficial', url: 'https://facebook.com/soytome' }
                ]
            }
        ];

        function App() {
            const [categories, setCategories] = useState(INITIAL_DATA);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [newCatTitle, setNewCatTitle] = useState('');
            const [newCatIcon, setNewCatIcon] = useState('fa-whatsapp'); // Icono por defecto
            
            const [editingLink, setEditingLink] = useState(null);
            const [newLinkData, setNewLinkData] = useState({ title: '', url: '' });

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'ian' && password === 'ian123') {
                    setIsAdmin(true);
                    setShowLogin(false);
                    setLoginError('');
                    setUsername('');
                    setPassword('');
                } else {
                    setLoginError('Acceso denegado. Intento registrado.');
                }
            };

            const addCategory = () => {
                if (!newCatTitle.trim()) return;
                setCategories([...categories, { 
                    id: `cat-${Date.now()}`, 
                    title: newCatTitle, 
                    iconId: newCatIcon, 
                    links: [] 
                }]);
                setNewCatTitle('');
            };

            const deleteCategory = (catId) => {
                if (confirm('⚠️ PELIGRO: ¿Estás seguro de eliminar esta categoría y TODOS sus enlaces?')) {
                    setCategories(categories.filter(c => c.id !== catId));
                }
            };

            const addLink = (catId) => {
                if (!newLinkData.title.trim() || !newLinkData.url.trim()) return;
                setCategories(categories.map(cat => cat.id === catId ? { ...cat, links: [...cat.links, { id: `link-${Date.now()}`, ...newLinkData }] } : cat));
                setNewLinkData({ title: '', url: '' });
                setEditingLink(null);
            };

            const deleteLink = (catId, linkId) => {
                setCategories(categories.map(cat => cat.id === catId ? { ...cat, links: cat.links.filter(l => l.id !== linkId) } : cat));
            };

            // Función para obtener los estilos del icono basado en su ID
            const getIconConfig = (id) => {
                return ICON_OPTIONS.find(icon => icon.id === id) || ICON_OPTIONS[4]; // Globe por defecto
            };

            return (
                <div className="min-h-screen relative overflow-hidden pb-24 selection:bg-purple-500/30">
                    {/* Background Premium Ambient */}
                    <div className="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
                        <div className="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-purple-900/20 rounded-full blur-[150px] mix-blend-screen"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-blue-900/20 rounded-full blur-[150px] mix-blend-screen"></div>
                        <div className="absolute top-[40%] left-[50%] translate-x-[-50%] w-[40%] h-[40%] bg-emerald-900/10 rounded-full blur-[120px] mix-blend-screen"></div>
                        <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+')] opacity-20 mix-blend-overlay"></div>
                    </div>

                    {/* Header Minimalista / Premium */}
                    <header className="relative z-50 pt-8 pb-4">
                        <div className="max-w-6xl mx-auto px-4 flex items-center justify-between">
                            <div className="flex-1"></div> {/* Espaciador */}
                            
                            {/* Logo ST Centralizado */}
                            <div className="animate-fade-in flex flex-col items-center justify-center">
                                <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-600 via-indigo-600 to-blue-600 flex items-center justify-center font-black text-3xl text-white border border-white/20 logo-glow tracking-tighter shadow-2xl">
                                    ST
                                </div>
                            </div>
                            
                            {/* Control CEO */}
                            <div className="flex-1 flex justify-end animate-fade-in">
                                {isAdmin ? (
                                    <button onClick={() => setIsAdmin(false)} className="flex items-center gap-2 px-4 py-2 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 transition-all text-sm font-bold backdrop-blur-sm">
                                        <i className="fa-solid fa-power-off"></i> Salir
                                    </button>
                                ) : (
                                    <button onClick={() => setShowLogin(true)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 hover:border-white/10 text-slate-400 hover:text-white transition-all backdrop-blur-sm">
                                        <i className="fa-solid fa-fingerprint"></i>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="relative z-10 max-w-4xl mx-auto px-4 py-8">
                        {/* Panel Admin CEO */}
                        {isAdmin && (
                            <div className="mb-12 p-6 rounded-3xl glass-panel border-purple-500/40 animate-fade-in shadow-[0_0_40px_rgba(168,85,247,0.1)]">
                                <div className="flex items-center gap-3 mb-6 pb-4 border-b border-white/5">
                                    <div className="w-10 h-10 rounded-xl bg-purple-500/20 flex items-center justify-center border border-purple-500/30">
                                        <i className="fa-solid fa-bolt text-purple-400"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-white tracking-wide">Centro de Mando CEO</h3>
                                </div>
                                
                                <div className="space-y-4">
                                    <div className="flex flex-col md:flex-row gap-4">
                                        <input 
                                            type="text" 
                                            placeholder="Nombre de la nueva sección..." 
                                            className="flex-1 bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all" 
                                            value={newCatTitle} 
                                            onChange={(e) => setNewCatTitle(e.target.value)} 
                                        />
                                        <button 
                                            onClick={addCategory} 
                                            className="bg-white text-black hover:bg-slate-200 px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all transform active:scale-95"
                                        >
                                            <i className="fa-solid fa-plus"></i> Crear
                                        </button>
                                    </div>
                                    
                                    {/* Selector de Iconos para nueva categoría */}
                                    <div className="bg-black/20 rounded-2xl p-4 border border-white/5">
                                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Selecciona el ícono principal</p>
                                        <div className="flex flex-wrap gap-2">
                                            {ICON_OPTIONS.map(icon => (
                                                <button 
                                                    key={icon.id}
                                                    onClick={() => setNewCatIcon(icon.id)}
                                                    className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl transition-all border ${
                                                        newCatIcon === icon.id 
                                                        ? `border-white/50 shadow-lg ${icon.bg}` 
                                                        : 'border-white/5 bg-white/5 hover:bg-white/10 opacity-60 hover:opacity-100'
                                                    }`}
                                                >
                                                    <i className={`${icon.class} ${icon.color}`}></i>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Grilla de Categorías */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {categories.map((category, index) => {
                                const iconConfig = getIconConfig(category.iconId);
                                const animationDelay = `delay-${(index % 3 + 1) * 100}`;
                                
                                return (
                                    <div key={category.id} className={`rounded-3xl glass-panel p-1 border-white/5 hover:border-white/10 transition-all duration-500 animate-fade-in ${animationDelay} group`}>
                                        <div className="p-6 bg-slate-950/50 rounded-[22px] h-full">
                                            {/* Cabecera de Categoría */}
                                            <div className="flex items-center justify-between mb-6">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-12 h-12 rounded-2xl ${iconConfig.bg} flex items-center justify-center text-2xl border border-white/5 shadow-inner`}>
                                                        <i className={`${iconConfig.class} ${iconConfig.color}`}></i>
                                                    </div>
                                                    <h3 className="text-xl font-bold text-white tracking-tight">{category.title}</h3>
                                                </div>
                                                {isAdmin && (
                                                    <button onClick={() => deleteCategory(category.id)} className="w-10 h-10 rounded-xl flex items-center justify-center text-slate-500 hover:text-red-400 hover:bg-red-500/10 border border-transparent hover:border-red-500/20 transition-all">
                                                        <i className="fa-solid fa-trash-can"></i>
                                                    </button>
                                                )}
                                            </div>

                                            {/* Lista de Enlaces */}
                                            <div className="space-y-3">
                                                {category.links.map((link) => (
                                                    <div key={link.id} className="flex gap-2 items-center group/item">
                                                        <a 
                                                            href={link.url} 
                                                            target="_blank" 
                                                            rel="noopener noreferrer"
                                                            className="flex-1 flex justify-between items-center p-4 rounded-2xl bg-black/40 border border-white/5 hover:border-white/20 hover:bg-white/5 transition-all duration-300"
                                                        >
                                                            <span className="font-semibold text-slate-300 group-hover/item:text-white transition-colors">{link.title}</span>
                                                            <div className="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center group-hover/item:bg-white/10 transition-all">
                                                                <i className="fa-solid fa-arrow-right text-slate-500 group-hover/item:text-white text-sm -rotate-45 transition-transform group-hover/item:translate-x-0.5 group-hover/item:-translate-y-0.5"></i>
                                                            </div>
                                                        </a>
                                                        {isAdmin && (
                                                            <button onClick={() => deleteLink(category.id, link.id)} className="w-14 h-[60px] rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 hover:text-red-300 transition-colors flex items-center justify-center">
                                                                <i className="fa-solid fa-xmark text-lg"></i>
                                                            </button>
                                                        )}
                                                    </div>
                                                ))}

                                                {/* Controles de Admin: Añadir Link */}
                                                {isAdmin && (
                                                    <div className="pt-3 mt-3">
                                                        {editingLink === category.id ? (
                                                            <div className="space-y-3 p-5 rounded-2xl bg-black/60 border border-purple-500/30 shadow-inner">
                                                                <input type="text" placeholder="Título del botón (Ej: Ver Ofertas)" className="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500 transition-colors" value={newLinkData.title} onChange={(e) => setNewLinkData({...newLinkData, title: e.target.value})} />
                                                                <input type="url" placeholder="https://..." className="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500 transition-colors" value={newLinkData.url} onChange={(e) => setNewLinkData({...newLinkData, url: e.target.value})} />
                                                                <div className="flex gap-2 pt-2">
                                                                    <button onClick={() => addLink(category.id)} className="flex-1 bg-white text-black hover:bg-slate-200 py-3 rounded-xl text-sm font-bold transition-all">Confirmar Enlace</button>
                                                                    <button onClick={() => setEditingLink(null)} className="px-5 bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-xl transition-all"><i className="fa-solid fa-times"></i></button>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <button onClick={() => setEditingLink(category.id)} className="w-full py-4 rounded-2xl border border-dashed border-white/10 text-slate-500 hover:text-white hover:border-white/30 hover:bg-white/5 text-sm font-bold transition-all flex items-center justify-center gap-2">
                                                                <i className="fa-solid fa-link"></i> Añadir Enlace
                                                            </button>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* Modal de Login Elegante */}
                    {showLogin && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center px-4 bg-black/90 backdrop-blur-xl animate-fade-in">
                            <div className="bg-slate-950 border border-white/10 p-10 rounded-[2rem] w-full max-w-md relative shadow-[0_0_100px_rgba(168,85,247,0.15)]">
                                <button onClick={() => setShowLogin(false)} className="absolute top-6 right-6 w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 text-slate-400 hover:text-white hover:bg-white/10 transition-colors">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                                
                                <div className="text-center mb-10">
                                    <div className="w-20 h-20 bg-gradient-to-br from-purple-500/10 to-blue-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-white/5 shadow-inner">
                                        <i className="fa-solid fa-fingerprint text-white text-3xl opacity-80"></i>
                                    </div>
                                    <h2 className="text-3xl font-black text-white tracking-tight">Acceso Restringido</h2>
                                    <p className="text-slate-500 text-sm mt-2 font-medium">Validación de identidad requerida</p>
                                </div>

                                <form onSubmit={handleLogin} className="space-y-5">
                                    <div>
                                        <input type="text" placeholder="Identificador" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-white/30 focus:bg-white/10 transition-all font-medium placeholder-slate-600" required />
                                    </div>
                                    <div>
                                        <input type="password" placeholder="Código de acceso" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-white/30 focus:bg-white/10 transition-all font-medium placeholder-slate-600" required />
                                    </div>
                                    
                                    {loginError && (
                                        <div className="bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-4 rounded-xl flex items-center gap-3 font-medium">
                                            <i className="fa-solid fa-triangle-exclamation"></i>
                                            {loginError}
                                        </div>
                                    )}
                                    
                                    <button type="submit" className="w-full bg-white hover:bg-slate-200 text-black font-black py-4 px-4 rounded-2xl mt-8 transition-all transform active:scale-[0.98] shadow-[0_0_30px_rgba(255,255,255,0.1)] text-lg">
                                        Desbloquear Panel
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
