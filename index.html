<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soy Tomé Hub</title>
    <!-- Tailwind para el diseño de lujo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM y Babel cargados directamente para no requerir instalación -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Iconos de FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_DATA = [
            {
                id: 'cat-1',
                title: 'Grupos de WhatsApp',
                icon: 'fa-whatsapp',
                links: [
                    { id: 'link-1', title: 'Avisos Tomé Oficial', url: 'https://chat.whatsapp.com/ejemplo1' },
                    { id: 'link-2', title: 'Feria de las Pulgas', url: 'https://chat.whatsapp.com/ejemplo2' }
                ]
            },
            {
                id: 'cat-2',
                title: 'Comunidades RRSS',
                icon: 'fa-instagram',
                links: [
                    { id: 'link-3', title: 'Instagram Soy Tomé', url: 'https://instagram.com/soytome' },
                    { id: 'link-4', title: 'Facebook Page', url: 'https://facebook.com/soytome' }
                ]
            }
        ];

        function App() {
            const [categories, setCategories] = useState(INITIAL_DATA);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [newCatTitle, setNewCatTitle] = useState('');
            const [editingLink, setEditingLink] = useState(null);
            const [newLinkData, setNewLinkData] = useState({ title: '', url: '' });

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'ian' && password === 'ian123') {
                    setIsAdmin(true);
                    setShowLogin(false);
                    setLoginError('');
                    setUsername('');
                    setPassword('');
                } else {
                    setLoginError('Credenciales incorrectas. Acceso denegado.');
                }
            };

            const addCategory = () => {
                if (!newCatTitle.trim()) return;
                setCategories([...categories, { id: `cat-${Date.now()}`, title: newCatTitle, icon: 'fa-layer-group', links: [] }]);
                setNewCatTitle('');
            };

            const deleteCategory = (catId) => {
                if (confirm('¿Estás seguro de eliminar esta categoría completa?')) {
                    setCategories(categories.filter(c => c.id !== catId));
                }
            };

            const addLink = (catId) => {
                if (!newLinkData.title.trim() || !newLinkData.url.trim()) return;
                setCategories(categories.map(cat => cat.id === catId ? { ...cat, links: [...cat.links, { id: `link-${Date.now()}`, ...newLinkData }] } : cat));
                setNewLinkData({ title: '', url: '' });
                setEditingLink(null);
            };

            const deleteLink = (catId, linkId) => {
                setCategories(categories.map(cat => cat.id === catId ? { ...cat, links: cat.links.filter(l => l.id !== linkId) } : cat));
            };

            return (
                <div className="min-h-screen relative overflow-hidden pb-20 selection:bg-purple-500/30">
                    {/* Efectos de fondo premium */}
                    <div className="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-700/20 rounded-full blur-[120px] pointer-events-none"></div>
                    <div className="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-700/20 rounded-full blur-[120px] pointer-events-none"></div>

                    {/* Header */}
                    <header className="sticky top-0 z-50 glass-panel border-b border-x-0 border-t-0 rounded-none bg-slate-950/40">
                        <div className="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center font-bold text-xl text-white shadow-lg shadow-purple-500/20">ST</div>
                                <h1 className="text-2xl font-black tracking-tight text-white">Soy<span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">Tomé</span></h1>
                            </div>
                            {isAdmin ? (
                                <button onClick={() => setIsAdmin(false)} className="flex items-center gap-2 px-4 py-2 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-all text-sm font-medium">
                                    <i className="fa-solid fa-right-from-bracket"></i> Salir CEO
                                </button>
                            ) : (
                                <button onClick={() => setShowLogin(true)} className="p-2 rounded-lg hover:bg-white/5 text-slate-500 hover:text-slate-300 transition-colors">
                                    <i className="fa-solid fa-lock"></i>
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="relative z-10 max-w-6xl mx-auto px-4 py-12">
                        {/* Hero Section */}
                        <div className="text-center mb-16">
                            <h2 className="text-4xl md:text-6xl font-black text-white mb-6 tracking-tight leading-tight">
                                Conecta con tu <br className="hidden md:block"/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-blue-400 to-purple-400">Comunidad</span>
                            </h2>
                            <p className="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto font-light">
                                El directorio definitivo de enlaces, grupos y redes sociales de Tomé. Encuentra lo que buscas sin rodeos.
                            </p>
                        </div>

                        {/* Panel Admin */}
                        {isAdmin && (
                            <div className="mb-12 p-6 rounded-2xl glass-panel border-purple-500/30">
                                <div className="flex items-center gap-3 mb-6 border-b border-white/10 pb-4">
                                    <i className="fa-solid fa-shield-halved text-purple-400 text-xl"></i>
                                    <h3 className="text-xl font-bold text-white">Panel de Control CEO</h3>
                                </div>
                                <div className="flex gap-3">
                                    <input 
                                        type="text" 
                                        placeholder="Nombre nueva categoría (Ej: Trámites)" 
                                        className="flex-1 bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors" 
                                        value={newCatTitle} 
                                        onChange={(e) => setNewCatTitle(e.target.value)} 
                                    />
                                    <button 
                                        onClick={addCategory} 
                                        className="bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2 transition-all"
                                    >
                                        <i className="fa-solid fa-plus"></i> Agregar
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Grilla de Categorías */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {categories.map((category) => (
                                <div key={category.id} className="rounded-2xl glass-panel p-6 hover:border-white/20 transition-all duration-300">
                                    <div className="flex items-center justify-between mb-6">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-xl shadow-inner shadow-white/5">
                                                <i className={`fa-brands ${category.icon} text-emerald-400`}></i>
                                            </div>
                                            <h3 className="text-xl font-bold text-white">{category.title}</h3>
                                        </div>
                                        {isAdmin && (
                                            <button onClick={() => deleteCategory(category.id)} className="w-8 h-8 rounded-lg flex items-center justify-center text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-colors">
                                                <i className="fa-solid fa-trash text-sm"></i>
                                            </button>
                                        )}
                                    </div>

                                    <div className="space-y-3">
                                        {category.links.map((link) => (
                                            <div key={link.id} className="flex gap-2 items-center">
                                                <a 
                                                    href={link.url} 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="flex-1 flex justify-between items-center p-4 rounded-xl bg-black/40 border border-white/5 hover:border-blue-500/40 hover:bg-white/5 transition-all group"
                                                >
                                                    <span className="font-medium text-slate-300 group-hover:text-white transition-colors">{link.title}</span>
                                                    <i className="fa-solid fa-arrow-up-right-from-square text-slate-500 group-hover:text-blue-400 text-sm transition-colors"></i>
                                                </a>
                                                {isAdmin && (
                                                    <button onClick={() => deleteLink(category.id, link.id)} className="p-4 rounded-xl bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-colors">
                                                        <i className="fa-solid fa-trash"></i>
                                                    </button>
                                                )}
                                            </div>
                                        ))}

                                        {isAdmin && (
                                            <div className="pt-4 border-t border-white/5 mt-4">
                                                {editingLink === category.id ? (
                                                    <div className="space-y-3 p-4 rounded-xl bg-black/30 border border-purple-500/30 shadow-inner">
                                                        <input type="text" placeholder="Título del enlace" className="w-full bg-black/50 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-purple-500 transition-colors" value={newLinkData.title} onChange={(e) => setNewLinkData({...newLinkData, title: e.target.value})} />
                                                        <input type="url" placeholder="https://ejemplo.com" className="w-full bg-black/50 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-purple-500 transition-colors" value={newLinkData.url} onChange={(e) => setNewLinkData({...newLinkData, url: e.target.value})} />
                                                        <div className="flex gap-2">
                                                            <button onClick={() => addLink(category.id)} className="flex-1 bg-purple-600 hover:bg-purple-500 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">Guardar Link</button>
                                                            <button onClick={() => setEditingLink(null)} className="px-4 bg-white/5 hover:bg-white/10 text-white rounded-lg transition-colors"><i className="fa-solid fa-xmark"></i></button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => setEditingLink(category.id)} className="w-full py-3 rounded-xl border border-dashed border-white/20 text-slate-400 hover:text-white hover:border-purple-500/50 hover:bg-purple-500/5 text-sm font-medium transition-all">
                                                        <i className="fa-solid fa-plus mr-2"></i> Añadir Enlace
                                                    </button>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modal de Login */}
                    {showLogin && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center px-4 bg-black/80 backdrop-blur-md">
                            <div className="bg-slate-900 border border-white/10 p-8 rounded-2xl w-full max-w-md relative shadow-2xl shadow-purple-500/20">
                                <button onClick={() => setShowLogin(false)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-lg text-slate-500 hover:text-white hover:bg-white/10 transition-colors">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                                <div className="text-center mb-8">
                                    <div className="w-14 h-14 bg-gradient-to-br from-purple-500/20 to-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-purple-500/20">
                                        <i className="fa-solid fa-shield-halved text-purple-400 text-2xl"></i>
                                    </div>
                                    <h2 className="text-2xl font-bold text-white">Acceso CEO</h2>
                                    <p className="text-slate-400 text-sm mt-1">Panel de Control Soy Tomé</p>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Usuario</label>
                                        <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors" required />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Contraseña</label>
                                        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors" required />
                                    </div>
                                    {loginError && <p className="text-red-400 text-sm bg-red-400/10 p-3 rounded-lg border border-red-400/20 flex items-center gap-2"><i className="fa-solid fa-circle-exclamation"></i> {loginError}</p>}
                                    <button type="submit" className="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-bold py-3.5 px-4 rounded-xl mt-6 transition-all transform active:scale-[0.98] shadow-lg shadow-purple-500/25">
                                        Ingresar al Sistema
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
