<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soy Tomé Hub | Ecosistema</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CORE BLACK LABEL DESIGN SYSTEM */
        :root {
            --primary-rgb: 168, 85, 247; 
            --bg-color: #030303; 
        }

        body { 
            background-color: var(--bg-color); 
            color: #e2e8f0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        /* Glassmorphism Ultra-Premium */
        .glass-panel { 
            background: rgba(15, 15, 15, 0.6); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.04); 
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.9);
        }
        
        .glass-panel:hover {
            border: 1px solid rgba(var(--primary-rgb), 0.25);
            box-shadow: 0 20px 50px -10px rgba(var(--primary-rgb), 0.15);
        }

        /* Animaciones dinámicas de interfaz */
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes slideRight { 0% { opacity: 0; transform: translateX(-20px); } 100% { opacity: 1; transform: translateX(0); } }
        
        .anim-fade { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .anim-scale { animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .anim-slide { animation: slideRight 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        
        /* Delays */
        .d-100 { animation-delay: 100ms; } .d-200 { animation-delay: 200ms; } .d-300 { animation-delay: 300ms; }

        /* Efectos Temáticos Dinámicos */
        .theme-glow { box-shadow: 0 0 40px rgba(var(--primary-rgb), 0.3); }
        .theme-text { color: rgb(var(--primary-rgb)); }
        .theme-bg { background-color: rgb(var(--primary-rgb)); }
        .theme-border { border-color: rgba(var(--primary-rgb), 0.5); }
        .theme-hover:hover { background-color: rgba(var(--primary-rgb), 0.1); color: rgb(var(--primary-rgb)); }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(var(--primary-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0); }
        }
        .cta-pulse { animation: pulseGlow 2s infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(var(--primary-rgb)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = window.React;
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // =========================================================================
        // 🚨 CONFIGURACIÓN FIREBASE (Tus llaves ya están aquí) 🚨
        // =========================================================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyCYQHwLpWxQxYj8Lk7GLAQT3c2_YaFs8Ew",
            authDomain: "soy-tome.firebaseapp.com",
            projectId: "soy-tome",
            storageBucket: "soy-tome.firebasestorage.app",
            messagingSenderId: "381653906684",
            appId: "1:381653906684:web:1c0a213ab4364fbed81379"
        };
        
        const isCanvas = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isCanvas ? JSON.parse(__firebase_config) : myFirebaseConfig;
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'soytome-prod';

        const getCatsPath = () => isCanvas ? `artifacts/${appId}/public/data/categorias` : 'hub_categorias';
        const getSettingsPath = () => isCanvas ? `artifacts/${appId}/public/data/config` : 'hub_settings';

        // NUEVAS OPCIONES PREMIUM (Diseño y Plantillas)
        const THEMES = {
            magenta: { name: 'Magenta Cyber', rgb: '217, 70, 239' },
            coral: { name: 'Coral Sunset', rgb: '251, 113, 133' },
            cyan: { name: 'Cyan Matrix', rgb: '6, 182, 212' },
            purple: { name: 'Púrpura Neón', rgb: '168, 85, 247' },
            emerald: { name: 'Esmeralda', rgb: '16, 185, 129' },
            gold: { name: 'Oro Premium', rgb: '234, 179, 8' }
        };

        const LAYOUTS = {
            grid: { name: 'Grid Dinámico', icon: 'fa-border-all' },
            list: { name: 'Lista Minimalista', icon: 'fa-list' }
        };

        const ANIMATIONS = {
            fade: { name: 'Cascada', class: 'anim-fade' },
            scale: { name: 'Zoom In', class: 'anim-scale' },
            slide: { name: 'Slide Lateral', class: 'anim-slide' }
        };

        const ICONS = [
            { id: 'fa-whatsapp', class: 'fa-brands fa-whatsapp' },
            { id: 'fa-facebook', class: 'fa-brands fa-facebook' },
            { id: 'fa-instagram', class: 'fa-brands fa-instagram' },
            { id: 'fa-tiktok', class: 'fa-brands fa-tiktok' },
            { id: 'fa-youtube', class: 'fa-brands fa-youtube' },
            { id: 'fa-threads', class: 'fa-brands fa-threads' },
            { id: 'fa-globe', class: 'fa-solid fa-globe' },
            { id: 'fa-users', class: 'fa-solid fa-users' },
            { id: 'fa-bullhorn', class: 'fa-solid fa-bullhorn' },
            { id: 'fa-podcast', class: 'fa-solid fa-podcast' },
            { id: 'fa-store', class: 'fa-solid fa-store' },
            { id: 'fa-newspaper', class: 'fa-regular fa-newspaper' }
        ];

        const DEFAULT_SETTINGS = {
            theme: 'magenta',
            layout: 'grid',
            animation: 'fade',
            logoUrl: '',
            ceoPhoto: '',
            ceoName: 'Ian',
            ceoRole: 'CEO & Founder',
            showCeo: true,
            ctaEnabled: true,
            ctaText: 'Si no te ven, no existes. Aumenta tu visibilidad ahora.',
            ctaPhone: '56900000000',
            ctaMessage: 'Hola Ian, quiero publicidad Black Label en Soy Tomé.'
        };

        function App() {
            const [user, setUser] = useState(null);
            const [categories, setCategories] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [adminTab, setAdminTab] = useState('links'); 

            // Auth Local State
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            // Edición de Categorías
            const [newCatTitle, setNewCatTitle] = useState('');
            const [newCatIcon, setNewCatIcon] = useState('fa-globe');
            const [editingCategory, setEditingCategory] = useState(null);
            const [editCatTitle, setEditCatTitle] = useState('');

            // Edición de Enlaces
            const [addingLinkTo, setAddingLinkTo] = useState(null);
            const [newLinkData, setNewLinkData] = useState({ title: '', url: '' });
            const [editingLinkObj, setEditingLinkObj] = useState(null); // { catId, linkId }
            const [editLinkData, setEditLinkData] = useState({ title: '', url: '' });

            // 1. AUTENTICACIÓN FIREBASE SEGURA
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (isCanvas && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth error", e);
                    }
                };
                initAuth();
                const unsubAuth = onAuthStateChanged(auth, setUser);
                return () => unsubAuth();
            }, []);

            // 2. SINCRONIZACIÓN DE DATOS (Solo si hay usuario autenticado)
            useEffect(() => {
                if (!user) return;
                
                const unsubCats = onSnapshot(collection(db, getCatsPath()), (snapshot) => {
                    const loaded = [];
                    snapshot.forEach(doc => loaded.push({ id: doc.id, ...doc.data() }));
                    // Ordenamos por la propiedad "order". Si no existe, por fecha de creación (ID)
                    loaded.sort((a, b) => (a.order || 0) - (b.order || 0) || a.id.localeCompare(b.id));
                    setCategories(loaded);
                });

                const unsubSettings = onSnapshot(doc(db, getSettingsPath(), 'global'), (docSnap) => {
                    if (docSnap.exists()) {
                        setSettings({ ...DEFAULT_SETTINGS, ...docSnap.data() });
                    } else {
                        setDoc(doc(db, getSettingsPath(), 'global'), DEFAULT_SETTINGS);
                    }
                    setIsLoading(false);
                });

                return () => { unsubCats(); unsubSettings(); };
            }, [user]);

            useEffect(() => {
                if (THEMES[settings.theme]) {
                    document.documentElement.style.setProperty('--primary-rgb', THEMES[settings.theme].rgb);
                }
            }, [settings.theme]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'ian' && password === 'ian123') {
                    setIsAdmin(true); setShowLogin(false); setLoginError(''); setUsername(''); setPassword('');
                } else {
                    setLoginError('Credenciales erróneas. Intento registrado.');
                }
            };

            const updateSettings = async (newConfig) => {
                const updated = { ...settings, ...newConfig };
                setSettings(updated); 
                await setDoc(doc(db, getSettingsPath(), 'global'), updated);
            };

            // ================= CRUD CATEGORÍAS =================
            const addCategory = async () => {
                if (!newCatTitle.trim()) return;
                const newId = `cat-${Date.now()}`;
                const newOrder = categories.length > 0 ? Math.max(...categories.map(c => c.order || 0)) + 1 : 0;
                await setDoc(doc(db, getCatsPath(), newId), { 
                    title: newCatTitle, 
                    iconId: newCatIcon, 
                    order: newOrder,
                    links: [] 
                });
                setNewCatTitle('');
            };

            const saveCategoryEdit = async (catId) => {
                if (!editCatTitle.trim()) { setEditingCategory(null); return; }
                const cat = categories.find(c => c.id === catId);
                if (cat) {
                    await setDoc(doc(db, getCatsPath(), catId), { ...cat, title: editCatTitle });
                }
                setEditingCategory(null);
            };

            const deleteCategory = async (catId) => {
                if (confirm('⚠️ ¿Eliminar esta categoría y todos sus enlaces?')) {
                    await deleteDoc(doc(db, getCatsPath(), catId));
                }
            };

            // Reordenar Categorías (Flechas)
            const moveCategory = async (index, direction) => {
                if (index + direction < 0 || index + direction >= categories.length) return;
                const catA = categories[index];
                const catB = categories[index + direction];
                
                // Intercambiamos el 'order'
                const orderA = catA.order !== undefined ? catA.order : index;
                const orderB = catB.order !== undefined ? catB.order : index + direction;
                
                await setDoc(doc(db, getCatsPath(), catA.id), { ...catA, order: orderB });
                await setDoc(doc(db, getCatsPath(), catB.id), { ...catB, order: orderA });
            };

            // ================= CRUD ENLACES =================
            const addLink = async (catId) => {
                if (!newLinkData.title.trim() || !newLinkData.url.trim()) return;
                const cat = categories.find(c => c.id === catId);
                if (cat) {
                    await setDoc(doc(db, getCatsPath(), catId), { 
                        ...cat, 
                        links: [...cat.links, { id: `link-${Date.now()}`, ...newLinkData }] 
                    });
                    setNewLinkData({ title: '', url: '' });
                    setAddingLinkTo(null);
                }
            };

            const saveLinkEdit = async () => {
                if (!editingLinkObj) return;
                const { catId, linkId } = editingLinkObj;
                const cat = categories.find(c => c.id === catId);
                if (cat) {
                    const updatedLinks = cat.links.map(l => l.id === linkId ? { ...l, ...editLinkData } : l);
                    await setDoc(doc(db, getCatsPath(), catId), { ...cat, links: updatedLinks });
                }
                setEditingLinkObj(null);
            };

            const deleteLink = async (catId, linkId) => {
                const cat = categories.find(c => c.id === catId);
                if (cat) {
                    await setDoc(doc(db, getCatsPath(), catId), { 
                        ...cat, 
                        links: cat.links.filter(l => l.id !== linkId) 
                    });
                }
            };

            const moveLink = async (catId, linkIndex, direction) => {
                const cat = categories.find(c => c.id === catId);
                if (!cat) return;
                if (linkIndex + direction < 0 || linkIndex + direction >= cat.links.length) return;
                
                const newLinks = [...cat.links];
                // Swap array elements
                const temp = newLinks[linkIndex];
                newLinks[linkIndex] = newLinks[linkIndex + direction];
                newLinks[linkIndex + direction] = temp;

                await setDoc(doc(db, getCatsPath(), catId), { ...cat, links: newLinks });
            };

            // Helpers
            const getAnimClass = () => ANIMATIONS[settings.animation]?.class || 'anim-fade';
            const generateWaLink = () => {
                const phone = settings.ctaPhone.replace(/\D/g, '');
                const text = encodeURIComponent(settings.ctaMessage);
                return `https://wa.me/${phone}?text=${text}`;
            };

            if (isLoading || !user) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#030303]">
                        <div className="w-16 h-16 border-2 border-white/5 border-t-purple-500 rounded-full animate-spin mb-6"></div>
                        <p className="text-white/30 text-[10px] font-bold tracking-[0.4em] animate-pulse">INICIALIZANDO MOTOR</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative overflow-hidden pb-32">
                    {/* Fondo Ambient Dynamics */}
                    <div className="fixed inset-0 pointer-events-none z-0 opacity-50">
                        <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full blur-[150px] mix-blend-screen theme-bg opacity-30"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full blur-[150px] mix-blend-screen theme-bg opacity-20"></div>
                        <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDMiLz4KPC9zdmc+')] opacity-50 mix-blend-overlay"></div>
                    </div>

                    {/* TOP BAR / CEO PROFILE */}
                    <header className="relative z-40 max-w-5xl mx-auto px-4 pt-6 pb-4 flex items-start justify-between">
                        {settings.showCeo && (
                            <div className={`${getAnimClass()} flex items-center gap-4 bg-black/40 pr-6 pl-2 py-2 rounded-full border border-white/5 backdrop-blur-xl`}>
                                {settings.ceoPhoto ? (
                                    <img src={settings.ceoPhoto} alt="CEO" className="w-12 h-12 rounded-full object-cover border-2 theme-border shadow-lg" />
                                ) : (
                                    <div className="w-12 h-12 rounded-full theme-bg bg-opacity-20 flex items-center justify-center border-2 theme-border text-white font-bold">
                                        <i className="fa-solid fa-user-tie"></i>
                                    </div>
                                )}
                                <div>
                                    <h2 className="text-white font-black text-sm tracking-wide">{settings.ceoName}</h2>
                                    <p className="theme-text text-[9px] font-bold tracking-widest uppercase">{settings.ceoRole}</p>
                                </div>
                            </div>
                        )}
                        {!settings.showCeo && <div></div>}

                        <div className={`${getAnimClass()} d-100`}>
                            {isAdmin ? (
                                <button onClick={() => setIsAdmin(false)} className="px-5 py-2.5 rounded-full bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 text-xs font-bold tracking-wider uppercase transition-all backdrop-blur-md">
                                    Cerrar Bóveda
                                </button>
                            ) : (
                                <button onClick={() => setShowLogin(true)} className="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 border border-white/5 hover:bg-white/10 text-white/30 hover:text-white transition-all backdrop-blur-md">
                                    <i className="fa-solid fa-fingerprint"></i>
                                </button>
                            )}
                        </div>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="relative z-30 max-w-4xl mx-auto px-4 pt-2 pb-12">
                        
                        {/* Logo Central */}
                        <div className={`${getAnimClass()} d-200 flex justify-center mb-16`}>
                            {settings.logoUrl ? (
                                <img src={settings.logoUrl} alt="Logo" className="h-28 object-contain theme-glow rounded-xl" />
                            ) : (
                                <div className="w-28 h-28 rounded-[2rem] theme-bg bg-opacity-10 border border-white/10 flex items-center justify-center theme-glow backdrop-blur-xl">
                                    <span className="text-5xl font-black text-white tracking-tighter">ST</span>
                                </div>
                            )}
                        </div>

                        {/* ================= PANEL DE CONTROL CEO (TABS) ================= */}
                        {isAdmin && (
                            <div className="mb-16 rounded-[2rem] bg-[#0a0a0a]/90 backdrop-blur-3xl border border-white/10 overflow-hidden shadow-2xl">
                                <div className="bg-white/5 p-6 border-b border-white/5 flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-2xl theme-bg flex items-center justify-center text-white text-xl shadow-lg">
                                        <i className="fa-solid fa-sliders"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-xl font-black text-white">Bóveda de Configuración</h3>
                                        <p className="theme-text text-xs font-bold tracking-widest uppercase">Modo Edición Total</p>
                                    </div>
                                </div>

                                <div className="flex border-b border-white/5 overflow-x-auto no-scrollbar">
                                    <button onClick={() => setAdminTab('links')} className={`flex-1 min-w-[120px] py-4 text-xs uppercase tracking-widest font-bold transition-colors ${adminTab === 'links' ? 'text-white border-b-2 theme-border bg-white/5' : 'text-white/40 hover:text-white/70'}`}>Estructura</button>
                                    <button onClick={() => setAdminTab('design')} className={`flex-1 min-w-[120px] py-4 text-xs uppercase tracking-widest font-bold transition-colors ${adminTab === 'design' ? 'text-white border-b-2 theme-border bg-white/5' : 'text-white/40 hover:text-white/70'}`}>Apariencia</button>
                                    <button onClick={() => setAdminTab('profile')} className={`flex-1 min-w-[120px] py-4 text-xs uppercase tracking-widest font-bold transition-colors ${adminTab === 'profile' ? 'text-white border-b-2 theme-border bg-white/5' : 'text-white/40 hover:text-white/70'}`}>Identidad</button>
                                    <button onClick={() => setAdminTab('marketing')} className={`flex-1 min-w-[120px] py-4 text-xs uppercase tracking-widest font-bold transition-colors ${adminTab === 'marketing' ? 'text-white border-b-2 theme-border bg-white/5' : 'text-white/40 hover:text-white/70'}`}>Marketing</button>
                                </div>

                                <div className="p-6">
                                    {/* TAB: ESTRUCTURA */}
                                    {adminTab === 'links' && (
                                        <div className="space-y-6 animate-fade-in">
                                            <div className="bg-black/50 p-5 rounded-2xl border border-white/5">
                                                <h4 className="text-white font-bold mb-4">Añadir Nueva Categoría</h4>
                                                <div className="flex flex-col md:flex-row gap-3">
                                                    <input type="text" placeholder="Ej: Mis Redes Sociales..." className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-white/30" value={newCatTitle} onChange={(e) => setNewCatTitle(e.target.value)} />
                                                    <button onClick={addCategory} className="theme-bg text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                                                        <i className="fa-solid fa-plus"></i> Crear
                                                    </button>
                                                </div>
                                                <div className="mt-4">
                                                    <p className="text-[10px] text-white/40 font-bold uppercase tracking-widest mb-3">Selector de Ícono</p>
                                                    <div className="flex flex-wrap gap-2">
                                                        {ICONS.map(i => (
                                                            <button key={i.id} onClick={() => setNewCatIcon(i.id)} className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg transition-all ${newCatIcon === i.id ? 'theme-bg text-white shadow-lg scale-110' : 'bg-white/5 border border-white/5 text-white/40 hover:bg-white/10 hover:text-white'}`}>
                                                                <i className={i.class}></i>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB: DISEÑO / APARIENCIA */}
                                    {adminTab === 'design' && (
                                        <div className="space-y-8 animate-fade-in">
                                            <div>
                                                <h4 className="text-white font-bold mb-3 flex items-center gap-2"><i className="fa-solid fa-palette theme-text"></i> Color Base Premium</h4>
                                                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                                    {Object.entries(THEMES).map(([key, theme]) => (
                                                        <button key={key} onClick={() => updateSettings({ theme: key })} className={`p-4 rounded-xl border text-left transition-all ${settings.theme === key ? 'border-white bg-white/10 shadow-[0_0_20px_rgba(255,255,255,0.1)]' : 'border-white/5 bg-black/50 hover:border-white/20'}`}>
                                                            <div className="w-full h-6 rounded-lg mb-3 shadow-inner" style={{ backgroundColor: `rgb(${theme.rgb})` }}></div>
                                                            <p className="text-[11px] text-white font-bold uppercase tracking-wider">{theme.name}</p>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div>
                                                    <h4 className="text-white font-bold mb-3 flex items-center gap-2"><i className="fa-solid fa-layer-group theme-text"></i> Disposición (Layout)</h4>
                                                    <div className="space-y-3">
                                                        {Object.entries(LAYOUTS).map(([key, layout]) => (
                                                            <button key={key} onClick={() => updateSettings({ layout: key })} className={`w-full p-4 rounded-xl border flex items-center gap-3 transition-all ${settings.layout === key ? 'border-white bg-white/10 text-white' : 'border-white/5 bg-black/50 text-white/40 hover:text-white hover:bg-white/5'}`}>
                                                                <i className={`fa-solid ${layout.icon} text-lg`}></i>
                                                                <span className="font-bold text-sm">{layout.name}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div>
                                                    <h4 className="text-white font-bold mb-3 flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles theme-text"></i> Animación de Entrada</h4>
                                                    <div className="space-y-3">
                                                        {Object.entries(ANIMATIONS).map(([key, anim]) => (
                                                            <button key={key} onClick={() => updateSettings({ animation: key })} className={`w-full p-4 rounded-xl border text-left transition-all ${settings.animation === key ? 'border-white bg-white/10 text-white' : 'border-white/5 bg-black/50 text-white/40 hover:text-white hover:bg-white/5'}`}>
                                                                <span className="font-bold text-sm">{anim.name}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB: IDENTIDAD (Logos y CEO) */}
                                    {adminTab === 'profile' && (
                                        <div className="space-y-6 animate-fade-in grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-4 bg-black/40 p-5 rounded-2xl border border-white/5">
                                                <h4 className="text-white font-bold flex items-center gap-2 mb-4"><i className="fa-solid fa-image theme-text"></i> Marca y Logo</h4>
                                                <div>
                                                    <label className="block text-[10px] text-white/50 font-bold mb-1 uppercase tracking-widest">URL Logo Central (Opcional)</label>
                                                    <input type="text" placeholder="https://ejemplo.com/logo.png" value={settings.logoUrl} onChange={(e) => updateSettings({ logoUrl: e.target.value })} className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:border-white/30 outline-none" />
                                                </div>
                                            </div>

                                            <div className="space-y-4 bg-black/40 p-5 rounded-2xl border border-white/5">
                                                <div className="flex items-center justify-between mb-4">
                                                    <h4 className="text-white font-bold flex items-center gap-2"><i className="fa-solid fa-id-badge theme-text"></i> Perfil CEO</h4>
                                                    <label className="relative inline-flex items-center cursor-pointer">
                                                        <input type="checkbox" checked={settings.showCeo} onChange={(e) => updateSettings({ showCeo: e.target.checked })} className="sr-only peer" />
                                                        <div className="w-9 h-5 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all theme-peer-checked"></div>
                                                    </label>
                                                </div>
                                                <div className="space-y-3" style={{ opacity: settings.showCeo ? 1 : 0.4 }}>
                                                    <div>
                                                        <label className="block text-[10px] text-white/50 font-bold mb-1 uppercase tracking-widest">Nombre Público</label>
                                                        <input type="text" disabled={!settings.showCeo} value={settings.ceoName} onChange={(e) => updateSettings({ ceoName: e.target.value })} className="w-full bg-black border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm focus:border-white/30 outline-none" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] text-white/50 font-bold mb-1 uppercase tracking-widest">Cargo / Título</label>
                                                        <input type="text" disabled={!settings.showCeo} value={settings.ceoRole} onChange={(e) => updateSettings({ ceoRole: e.target.value })} className="w-full bg-black border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm focus:border-white/30 outline-none" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] text-white/50 font-bold mb-1 uppercase tracking-widest">URL Foto Perfil</label>
                                                        <input type="text" disabled={!settings.showCeo} value={settings.ceoPhoto} onChange={(e) => updateSettings({ ceoPhoto: e.target.value })} className="w-full bg-black border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm focus:border-white/30 outline-none" />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB: MARKETING */}
                                    {adminTab === 'marketing' && (
                                        <div className="space-y-5 animate-fade-in">
                                            <div className="bg-black/50 p-6 rounded-2xl border border-white/5 relative overflow-hidden">
                                                <div className="absolute top-0 left-0 w-1 h-full theme-bg"></div>
                                                <div className="flex items-center justify-between mb-4">
                                                    <h4 className="text-white font-bold text-lg flex items-center gap-2"><i className="fa-solid fa-bullseye theme-text"></i> Aviso Flotante (Botón de Ventas)</h4>
                                                    <label className="relative inline-flex items-center cursor-pointer">
                                                        <input type="checkbox" checked={settings.ctaEnabled} onChange={(e) => updateSettings({ ctaEnabled: e.target.checked })} className="sr-only peer" />
                                                        <div className="w-11 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all theme-peer-checked"></div>
                                                    </label>
                                                </div>
                                                <div className="space-y-4 transition-opacity" style={{ opacity: settings.ctaEnabled ? 1 : 0.4 }}>
                                                    <div>
                                                        <label className="block text-[10px] text-white/50 font-bold mb-1 uppercase tracking-widest">Texto del Aviso (Gancho)</label>
                                                        <textarea value={settings.ctaText} onChange={(e) => updateSettings({ ctaText: e.target.value })} disabled={!settings.ctaEnabled} rows="2" className="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:border-white/30 outline-none resize-none"></textarea>
                                                    </div>
                                                    <div className="flex flex-col md:flex-row gap-4">
                                                        <div className="flex-[1]">
                                                            <label className="block text-[10px] text-white/50 font-bold mb-1 uppercase tracking-widest">WhatsApp Receptor</label>
                                                            <input type="text" value={settings.ctaPhone} onChange={(e) => updateSettings({ ctaPhone: e.target.value })} disabled={!settings.ctaEnabled} className="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:border-white/30 outline-none" />
                                                        </div>
                                                        <div className="flex-[2]">
                                                            <label className="block text-[10px] text-white/50 font-bold mb-1 uppercase tracking-widest">Mensaje Pre-escrito de Cliente</label>
                                                            <input type="text" value={settings.ctaMessage} onChange={(e) => updateSettings({ ctaMessage: e.target.value })} disabled={!settings.ctaEnabled} className="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:border-white/30 outline-none" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ================= RENDERIZADO DE ECOSISTEMA (GRID/LIST) ================= */}
                        <div className={settings.layout === 'grid' ? "grid grid-cols-1 md:grid-cols-2 gap-6" : "flex flex-col space-y-6 max-w-2xl mx-auto"}>
                            {categories.length === 0 && !isAdmin && (
                                <div className="text-center py-20 text-white/30 font-bold tracking-widest uppercase col-span-2">Ecosistema en Formación...</div>
                            )}

                            {categories.map((category, index) => {
                                const delay = `d-${(index % 3 + 1) * 100}`;
                                return (
                                    <div key={category.id} className={`${getAnimClass()} ${delay} glass-panel rounded-[2rem] p-1.5 relative group`}>
                                        <div className="bg-[#0a0a0a]/90 rounded-[1.7rem] p-6 h-full flex flex-col">
                                            
                                            {/* Header Categoría */}
                                            <div className="flex items-start justify-between mb-6 gap-2">
                                                {editingCategory === category.id ? (
                                                    <div className="flex-1 flex gap-2">
                                                        <input type="text" autoFocus className="flex-1 bg-black border border-white/20 rounded-lg px-3 py-2 text-white font-bold focus:border-purple-500 outline-none" value={editCatTitle} onChange={(e)=>setEditCatTitle(e.target.value)} />
                                                        <button onClick={() => saveCategoryEdit(category.id)} className="theme-bg text-white px-4 rounded-lg font-bold"><i className="fa-solid fa-check"></i></button>
                                                        <button onClick={() => setEditingCategory(null)} className="bg-white/10 text-white/50 hover:text-white px-3 rounded-lg"><i className="fa-solid fa-xmark"></i></button>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center gap-4 flex-1">
                                                        <div className="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-xl text-white shadow-inner flex-shrink-0">
                                                            <i className={category.iconId}></i>
                                                        </div>
                                                        <h3 className="text-xl font-black text-white tracking-tight leading-tight">{category.title}</h3>
                                                    </div>
                                                )}

                                                {/* Controles Admin Categoría */}
                                                {isAdmin && !editingCategory && (
                                                    <div className="flex items-center gap-1 bg-black/50 p-1.5 rounded-xl border border-white/5">
                                                        <div className="flex flex-col border-r border-white/10 pr-1">
                                                            <button onClick={() => moveCategory(index, -1)} disabled={index === 0} className="text-white/30 hover:text-white disabled:opacity-30 disabled:hover:text-white/30 px-2 py-0.5"><i className="fa-solid fa-chevron-up text-[10px]"></i></button>
                                                            <button onClick={() => moveCategory(index, 1)} disabled={index === categories.length - 1} className="text-white/30 hover:text-white disabled:opacity-30 disabled:hover:text-white/30 px-2 py-0.5"><i className="fa-solid fa-chevron-down text-[10px]"></i></button>
                                                        </div>
                                                        <button onClick={() => { setEditCatTitle(category.title); setEditingCategory(category.id); }} className="w-8 h-8 flex items-center justify-center text-white/40 hover:text-blue-400 transition-colors"><i className="fa-solid fa-pen text-xs"></i></button>
                                                        <button onClick={() => deleteCategory(category.id)} className="w-8 h-8 flex items-center justify-center text-white/40 hover:text-red-400 transition-colors"><i className="fa-solid fa-trash-can text-xs"></i></button>
                                                    </div>
                                                )}
                                            </div>

                                            {/* Lista de Enlaces */}
                                            <div className="space-y-3 flex-1">
                                                {category.links.map((link, lIndex) => (
                                                    <div key={link.id} className="group/link relative">
                                                        {editingLinkObj?.linkId === link.id ? (
                                                            <div className="bg-black/80 p-3 rounded-xl border border-white/20 space-y-2">
                                                                <input type="text" className="w-full bg-transparent border-b border-white/10 px-2 py-1 text-white text-sm font-bold focus:border-purple-500 outline-none" value={editLinkData.title} onChange={(e)=>setEditLinkData({...editLinkData, title: e.target.value})} />
                                                                <input type="url" className="w-full bg-transparent border-b border-white/10 px-2 py-1 text-white text-xs focus:border-purple-500 outline-none" value={editLinkData.url} onChange={(e)=>setEditLinkData({...editLinkData, url: e.target.value})} />
                                                                <div className="flex gap-2 pt-2">
                                                                    <button onClick={saveLinkEdit} className="flex-1 theme-bg text-white py-1.5 rounded-lg text-xs font-bold">Guardar</button>
                                                                    <button onClick={() => setEditingLinkObj(null)} className="px-3 bg-white/10 text-white/50 hover:text-white rounded-lg"><i className="fa-solid fa-xmark"></i></button>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="flex items-stretch gap-2">
                                                                <a href={link.url} target="_blank" rel="noopener noreferrer" className="flex-1 flex justify-between items-center p-4 rounded-xl bg-black/60 border border-white/5 hover:border-white/20 theme-hover transition-all duration-300">
                                                                    <span className="font-bold text-white/80 group-hover/link:text-white transition-colors text-sm">{link.title}</span>
                                                                    <div className="w-7 h-7 rounded-full bg-white/5 flex items-center justify-center group-hover/link:bg-white/10 transition-all">
                                                                        <i className="fa-solid fa-arrow-right text-white/50 text-xs -rotate-45 group-hover/link:text-white transition-all group-hover/link:translate-x-0.5 group-hover/link:-translate-y-0.5"></i>
                                                                    </div>
                                                                </a>
                                                                
                                                                {isAdmin && (
                                                                    <div className="flex flex-col gap-1 w-10">
                                                                        <div className="flex-1 bg-black/50 rounded-lg flex flex-col items-center justify-center border border-white/5">
                                                                            <button onClick={() => moveLink(category.id, lIndex, -1)} disabled={lIndex===0} className="flex-1 w-full text-white/30 hover:text-white disabled:opacity-20"><i className="fa-solid fa-caret-up text-[10px]"></i></button>
                                                                            <button onClick={() => moveLink(category.id, lIndex, 1)} disabled={lIndex===category.links.length-1} className="flex-1 w-full text-white/30 hover:text-white disabled:opacity-20"><i className="fa-solid fa-caret-down text-[10px]"></i></button>
                                                                        </div>
                                                                        <div className="flex h-8 gap-1">
                                                                            <button onClick={() => { setEditLinkData({title: link.title, url: link.url}); setEditingLinkObj({catId: category.id, linkId: link.id}); }} className="flex-1 bg-blue-500/10 text-blue-400 hover:bg-blue-500/20 rounded-lg flex items-center justify-center"><i className="fa-solid fa-pen text-[10px]"></i></button>
                                                                            <button onClick={() => deleteLink(category.id, link.id)} className="flex-1 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-lg flex items-center justify-center"><i className="fa-solid fa-xmark text-[10px]"></i></button>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}

                                                {/* Botón Admin: Añadir Link a esta categoría */}
                                                {isAdmin && (
                                                    <div className="pt-2">
                                                        {addingLinkTo === category.id ? (
                                                            <div className="bg-black/80 p-4 rounded-xl border border-white/10 space-y-3">
                                                                <input type="text" placeholder="Nombre del Botón..." className="w-full bg-transparent border-b border-white/10 px-2 py-2 text-white focus:outline-none focus:border-white/50 text-sm font-bold" value={newLinkData.title} onChange={(e) => setNewLinkData({...newLinkData, title: e.target.value})} />
                                                                <input type="url" placeholder="https://..." className="w-full bg-transparent border-b border-white/10 px-2 py-2 text-white focus:outline-none focus:border-white/50 text-sm" value={newLinkData.url} onChange={(e) => setNewLinkData({...newLinkData, url: e.target.value})} />
                                                                <div className="flex gap-2 pt-2">
                                                                    <button onClick={() => addLink(category.id)} className="flex-1 theme-bg text-white py-2.5 rounded-lg text-sm font-bold">Inyectar</button>
                                                                    <button onClick={() => setAddingLinkTo(null)} className="px-4 bg-white/5 text-white/50 hover:text-white rounded-lg"><i className="fa-solid fa-times"></i></button>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <button onClick={() => setAddingLinkTo(category.id)} className="w-full py-3 rounded-xl border border-dashed border-white/10 text-white/30 hover:text-white hover:border-white/30 hover:bg-white/5 text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-2">
                                                                <i className="fa-solid fa-plus"></i> Inyectar Link
                                                            </button>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* POPUP DE VENTAS / CTA */}
                    {settings.ctaEnabled && !isAdmin && (
                        <div className="fixed bottom-6 right-6 z-50 animate-fade-in d-300 max-w-[280px] w-[calc(100%-3rem)] md:w-auto">
                            <a href={generateWaLink()} target="_blank" rel="noopener noreferrer" className="block p-1 rounded-2xl theme-bg cta-pulse transition-transform hover:scale-105 active:scale-95">
                                <div className="bg-[#050505] p-3.5 rounded-[14px] flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full theme-bg flex items-center justify-center text-white text-xl flex-shrink-0 shadow-inner">
                                        <i className="fa-brands fa-whatsapp"></i>
                                    </div>
                                    <div>
                                        <p className="text-white text-[11px] font-bold leading-tight">{settings.ctaText}</p>
                                    </div>
                                </div>
                            </a>
                        </div>
                    )}

                    {/* MODAL LOGIN */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center px-4 bg-black/95 backdrop-blur-2xl anim-scale">
                            <div className="bg-[#0a0a0a] border border-white/10 p-10 rounded-[2rem] w-full max-w-sm relative shadow-2xl">
                                <button onClick={() => setShowLogin(false)} className="absolute top-6 right-6 text-white/30 hover:text-white transition-colors">
                                    <i className="fa-solid fa-xmark text-xl"></i>
                                </button>
                                <div className="mb-10 text-center">
                                    <div className="w-16 h-16 mx-auto rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center mb-6">
                                        <i className="fa-solid fa-lock text-white/50 text-2xl"></i>
                                    </div>
                                    <h2 className="text-2xl font-black text-white tracking-tight">Acceso CEO</h2>
                                    <p className="text-white/40 text-[10px] mt-2 font-bold uppercase tracking-widest">Nivel de Bóveda Requerido</p>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input type="text" placeholder="Usuario" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full bg-white/5 border border-white/5 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-white/20 transition-all font-bold text-center" required />
                                    <input type="password" placeholder="Contraseña" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-white/5 border border-white/5 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-white/20 transition-all font-bold text-center tracking-[0.3em]" required />
                                    {loginError && <div className="text-red-400 text-xs text-center font-bold mt-2">{loginError}</div>}
                                    <button type="submit" className="w-full bg-white text-black hover:bg-gray-200 font-black py-4 rounded-xl mt-6 transition-transform active:scale-95 uppercase tracking-wider text-sm">
                                        Desbloquear
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const style = document.createElement('style');
        style.innerHTML = `.theme-peer-checked:checked ~ div { background-color: rgb(var(--primary-rgb)); }`;
        document.head.appendChild(style);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
