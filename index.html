<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soy Tomé Lux | Enlaces</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- CSS Reset & Variables --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gold: #D4AF37;
            --accent-hover: #F3E5AB;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Fondo Animado Premium --- */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08), transparent 40%),
                        radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.03), transparent 40%);
            z-index: -1;
            animation: slowMove 15s ease-in-out infinite alternate;
        }
        @keyframes slowMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-20px, 20px); }
        }

        /* --- Layout Principal --- */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        /* --- Header (Perfil) --- */
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            padding: 3px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .profile-title {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .profile-bio {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-top: 5px;
        }

        /* --- Botones de Enlaces Principales --- */
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .link-btn i {
            position: absolute;
            left: 20px;
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }
        .link-btn:hover {
            transform: translateY(-3px);
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .link-btn:hover i {
            color: var(--accent-gold);
        }
        
        /* Botón Destacado (Premium) */
        .btn-premium {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(212, 175, 55, 0.02));
            border-color: rgba(212, 175, 55, 0.4);
            font-weight: 700;
        }
        .btn-premium i { color: var(--accent-gold); }

        /* --- Redes Sociales Minimalistas --- */
        .social-icons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }
        .social-btn {
            color: var(--text-muted);
            font-size: 1.5rem;
            transition: color 0.3s ease, transform 0.3s ease;
            text-decoration: none;
        }
        .social-btn:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        /* --- UI Elements: Toast & Admin Trigger --- */
        .toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--accent-gold); color: #000; padding: 12px 24px; border-radius: 30px;
            font-weight: 700; z-index: 1000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3); display: flex; align-items: center; gap: 10px;
        }
        .toast-container.show { transform: translateX(-50%) translateY(0); }

        .admin-trigger {
            position: fixed; bottom: 20px; right: 20px; color: rgba(255,255,255,0.1);
            font-size: 1.2rem; cursor: pointer; z-index: 100; transition: color 0.3s;
        }
        .admin-trigger:hover { color: var(--accent-gold); }

        /* --- Modales Admin (Glassmorphism) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-box {
            background: #0a0a0a; border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            transform: translateY(20px); transition: transform 0.3s; max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-box h3 { font-size: 1.5rem; color: var(--accent-gold); margin-bottom: 25px; text-align: center; text-transform: uppercase; letter-spacing: 1px;}
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: var(--text-muted); margin-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; font-weight: 700;}
        .input-group input {
            width: 100%; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border); color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: var(--accent-gold); }
        
        .modal-btn {
            width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--text-main);
            color: #000; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 15px; transition: background 0.2s;
        }
        .modal-btn:hover { background: var(--accent-gold); }
        .close-modal { color: var(--text-muted); text-align: center; display: block; margin-top: 15px; cursor: pointer; font-size: 0.9rem;}
        .close-modal:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <!-- Toast Notification -->
    <div id="toast" class="toast-container">
        <i class="fa-solid fa-check-circle"></i>
        <span id="toast-msg">Mensaje</span>
    </div>

    <!-- Contenedor Principal -->
    <div class="container">
        
        <!-- Header -->
        <header class="profile-header">
            <!-- Reemplaza el src con la URL de tu logo -->
            <img src="https://ui-avatars.com/api/?name=Soy+Tome&background=D4AF37&color=000&font-size=0.33&bold=true" alt="Soy Tomé Lux" class="profile-img">
            <h1 class="profile-title">Soy Tomé <span style="color: var(--accent-gold);">Lux</span></h1>
            <p class="profile-bio">El directorio comercial definitivo del Biobío.</p>
        </header>

        <!-- Botones de Enlace -->
        <div class="links-wrapper">
            <a href="#" id="link-directorio" class="link-btn" target="_blank">
                <i class="fa-solid fa-store"></i> Directorio Comercial
            </a>
            <a href="#" id="link-unirse" class="link-btn btn-premium" target="_blank">
                <i class="fa-solid fa-bolt"></i> Anunciar mi Negocio
            </a>
            <!-- NOTA: Si usas esto para comercio.tome, elimina el botón de abajo -->
            <a href="#" id="link-noticias" class="link-btn" target="_blank">
                <i class="fa-solid fa-newspaper"></i> Enviar Noticias
            </a>
            <a href="#" id="link-contacto" class="link-btn" target="_blank">
                <i class="fa-solid fa-envelope"></i> Contacto Comercial
            </a>
        </div>

        <!-- Redes Sociales -->
        <div class="social-icons">
            <a href="#" id="link-ig" class="social-btn" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" id="link-tk" class="social-btn" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#" id="link-fb" class="social-btn" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" id="link-web" class="social-btn" target="_blank"><i class="fa-solid fa-globe"></i></a>
        </div>
    </div>

    <!-- Trigger Admin -->
    <div class="admin-trigger" id="btn-open-login">
        <i class="fa-solid fa-gear"></i>
    </div>

    <!-- Modal Login -->
    <div class="modal-overlay" id="modal-login">
        <div class="modal-box">
            <h3>Acceso Restringido</h3>
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="admin-user" placeholder="Admin">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="admin-pass" placeholder="••••••••">
            </div>
            <button class="modal-btn" id="btn-login">Ingresar</button>
            <span class="close-modal" id="btn-close-login">Cancelar</span>
        </div>
    </div>

    <!-- Modal Dashboard (Gestor de Links) -->
    <div class="modal-overlay" id="modal-dashboard">
        <div class="modal-box">
            <h3>Gestor de Enlaces</h3>
            
            <div class="input-group">
                <label>Directorio (Web)</label>
                <input type="text" id="input-directorio" placeholder="https://...">
            </div>
            <div class="input-group">
                <label>Anunciar Negocio</label>
                <input type="text" id="input-unirse" placeholder="https://...">
            </div>
            <div class="input-group">
                <label>Enviar Noticias</label>
                <input type="text" id="input-noticias" placeholder="https://...">
            </div>
            <div class="input-group">
                <label>Contacto</label>
                <input type="text" id="input-contacto" placeholder="https://...">
            </div>
            
            <hr style="border-color: var(--glass-border); margin: 20px 0;">
            
            <div class="input-group">
                <label>Instagram URL</label>
                <input type="text" id="input-ig" placeholder="https://...">
            </div>
            <div class="input-group">
                <label>TikTok URL</label>
                <input type="text" id="input-tk" placeholder="https://...">
            </div>
            
            <button class="modal-btn" id="btn-save-links">Guardar Cambios</button>
            <span class="close-modal" id="btn-close-dashboard">Cerrar Panel</span>
        </div>
    </div>

    <!-- Lógica JS Nivel LocalStorage -->
    <script>
        // DOM Elements
        const modalLogin = document.getElementById('modal-login');
        const modalDashboard = document.getElementById('modal-dashboard');
        const toast = document.getElementById('toast');

        // Configuración y Memoria
        const STORAGE_KEY = 'soytome_lux_links_v1';
        
        // Valores por defecto
        let appLinks = {
            directorio: "https://soytomelux.cl",
            unirse: "https://soytomelux.cl/unete",
            noticias: "https://wa.me/123456789",
            contacto: "mailto:contacto@soytomelux.cl",
            ig: "https://instagram.com/comercio.tome",
            tk: "https://tiktok.com/@soytome",
            fb: "https://facebook.com/soytome",
            web: "https://soytomelux.cl"
        };

        // Cargar desde LocalStorage al iniciar
        function loadLinks() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try { appLinks = JSON.parse(saved); } catch(e) {}
            }
            updateDOM();
        }

        // Aplicar links a los botones y llenar inputs del panel
        function updateDOM() {
            // Actualizar Botones Front
            document.getElementById('link-directorio').href = appLinks.directorio || "#";
            document.getElementById('link-unirse').href = appLinks.unirse || "#";
            document.getElementById('link-noticias').href = appLinks.noticias || "#";
            document.getElementById('link-contacto').href = appLinks.contacto || "#";
            document.getElementById('link-ig').href = appLinks.ig || "#";
            document.getElementById('link-tk').href = appLinks.tk || "#";

            // Llenar inputs del Admin
            document.getElementById('input-directorio').value = appLinks.directorio || "";
            document.getElementById('input-unirse').value = appLinks.unirse || "";
            document.getElementById('input-noticias').value = appLinks.noticias || "";
            document.getElementById('input-contacto').value = appLinks.contacto || "";
            document.getElementById('input-ig').value = appLinks.ig || "";
            document.getElementById('input-tk').value = appLinks.tk || "";
        }

        // Utilidad Toast
        function showToast(msg) {
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Interacciones UI
        document.getElementById('btn-open-login').addEventListener('click', () => modalLogin.classList.add('active'));
        document.getElementById('btn-close-login').addEventListener('click', () => modalLogin.classList.remove('active'));
        document.getElementById('btn-close-dashboard').addEventListener('click', () => modalDashboard.classList.remove('active'));

        // Login Falso Seguro
        document.getElementById('btn-login').addEventListener('click', () => {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            
            if (u === "prueba" && p === "prueba123") {
                modalLogin.classList.remove('active');
                document.getElementById('admin-user').value = "";
                document.getElementById('admin-pass').value = "";
                setTimeout(() => modalDashboard.classList.add('active'), 300);
            } else {
                showToast("⚠️ Acceso denegado");
            }
        });

        // Guardar Cambios
        document.getElementById('btn-save-links').addEventListener('click', () => {
            appLinks = {
                ...appLinks, // Mantiene los fb y web originales
                directorio: document.getElementById('input-directorio').value,
                unirse: document.getElementById('input-unirse').value,
                noticias: document.getElementById('input-noticias').value,
                contacto: document.getElementById('input-contacto').value,
                ig: document.getElementById('input-ig').value,
                tk: document.getElementById('input-tk').value
            };

            localStorage.setItem(STORAGE_KEY, JSON.stringify(appLinks));
            updateDOM();
            modalDashboard.classList.remove('active');
            showToast("Links actualizados con éxito");
        });

        // Init
        loadLinks();
    </script>
</body>
</html>
